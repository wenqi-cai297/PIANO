name: piano
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  # rtree is installed from conda-forge so libspatialindex (system C lib)
  # comes along for the ride. trimesh.proximity.closest_point needs it.
  - rtree
  - pip:
    - torch>=2.0
    - torchvision
    - accelerate
    - transformers
    - diffusers
    - einops
    - omegaconf
    - trimesh
    - smplx
    - scipy
    - scikit-learn
    - hmmlearn
    - open3d
    - matplotlib
    - tqdm
    - wandb
    - numpy
    # OpenAI CLIP (required by MoMask backbone)
    - ftfy
    - regex
    - git+https://github.com/openai/CLIP.git
