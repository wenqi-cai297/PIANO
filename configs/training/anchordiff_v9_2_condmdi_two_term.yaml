# V9.2: CondMDI two-term loss + x_0-prediction.
#
# Addresses the two root causes localised by the 2026-05-10 sanity
# battery (analyses/2026-05-10_v9_sanity_check_results.md):
#
# 1. v-prediction was making inference reconstruction brittle on small
#    data. Step 3 (one-clip overfit, 200 ep) showed training loss
#    oscillating 8-140 across consecutive epochs with no convergence,
#    and inference err 161 cm on the training clip. Fix: switch back
#    to x_0-pred (the field-standard for motion diffusion).
#
# 2. Single MSE over all valid frames gave the model no explicit
#    gradient to *copy* cond_motion at observed frames. Step 4
#    (all-observed test) showed 80-160 cm joint err even when the
#    model was given GT motion as full cond_motion + obs_mask=1
#    everywhere. Fix: split the MSE into two terms matching the
#    CondMDI reference impl (`setarehc/diffusion-motion-inbetweening`):
#      L_main = MSE over (obs_mask == 0) frames     # generation
#      L_kf   = MSE over (obs_mask == 1) frames     # copy gradient
#      L      = L_main + λ_kf · L_kf
#
# All other v9 changes preserved:
#   - smpl_pose_135_condmdi rep
#   - cond_motion_dim = 136 (motion 135 + obs_mask 1)
#   - random K∈[3,12] keyframes per training step
#   - object_traj_dim = 24
#   - anchor loss on all valid frames
#
# Trained from scratch (loss-shape change + prediction_target change
# both invalidate v9 ckpt warmstart).

model:
  cfg_drop_prob: 0.15

  diffusion:
    num_steps: 1000
    schedule: "cosine"
    prediction_target: "x0"          # ← change vs v9

  z_int:
    num_parts: 5
    phase_classes: 3
    support_classes: 3

  denoiser:
    motion_dim: 135
    object_traj_dim: 24
    cond_motion_dim: 136
    init_pose_dim: 66
    text_dim: 512
    object_token_dim: 256
    object_num_tokens: 128
    d_model: 512
    n_layers: 8
    n_heads: 4
    ff_mult: 4
    dropout: 0.1

  object_encoder:
    num_input_points: 1024
    num_output_tokens: 128
    feature_dim: 256

  text_encoder:
    clip_version: "ViT-B/32"
    download_root: "cache/clip"

data:
  datasets:
    - name: "chairs"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/chairs"
    - name: "imhd"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/imhd"
    - name: "neuraldome"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/neuraldome"
    - name: "omomo_correct_v2"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/omomo_correct_v2"
  pseudo_label_dir: null
  pseudo_label_subdir: "pseudo_labels/v18_h10_f05_pelvis20_official_semantic_marker"
  max_seq_length: 196
  support_collapse_hand_support: true
  motion_representation: "smpl_pose_135_condmdi"
  force_world_frame: true
  subsample_n_per_object: 10
  subsample_seed: 42

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42

  augmentation:
    enabled: true
    mirror_prob: 0.0
    rotate_around_y_prob: 0.0
    pc_jitter_std: 0.005

training:
  init_checkpoint: null
  batch_size: 16
  num_epochs: 80
  num_workers: 4
  seed: 42
  optimizer:
    name: "adamw"
    lr: 1.0e-4
    weight_decay: 0.01
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    warmup_steps: 500
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  mixed_precision: "bf16"
  val_every_epochs: 5
  val_best_key: "anchor_l2"

loss:
  anchor_weight: 1.0
  contact_threshold: 0.5

  # CondMDI two-term loss (v9.2 ADDITION):
  # Train-time only, only when cond_motion_dim > 0 in the model. The
  # train_anchordiff step_fn splits the diffusion MSE on the obs_mask:
  # main term over (mask==0), keyframes term over (mask==1).
  cond_motion_keyframe_weight: 1.0   # ← new; λ_kf

  motion_feature_weights:
    root_rot_vel: 1.0
    root_lin_vel: 1.0
    root_height_y: 1.0
    joint_pos_local: 1.0
    joint_rot_6d: 1.0
    joint_velocity: 1.0
    foot_contact: 1.0

  dynamic_metric:
    enabled: false
  motion_geometric:
    enabled: false

  world_joint_velocity_weight: 1.0
  fk_consistency_weight: 0.0
  pos_loss_weight: 5.0

logging:
  project: "piano"
  run_name: "stageB_anchordiff_v9_2_condmdi_two_term"
  log_every_n_steps: 50
  save_every_n_epochs: 5

output_dir: "runs/training/stageB_anchordiff_v9_2_condmdi_two_term"
