# V9: CondMDI keyframe-inpainting + v-prediction.
#
# Two architectural changes vs v8:
#
# 1. CondMDI training-time keyframe inpainting (Cohan et al. SIGGRAPH 2024).
#    - At training, each clip samples K∈[3,12] random frame indices.
#    - Builds a clean cond_motion (motion_dim=135) zeroed outside those
#      frames + a 1-D observation mask. Concatenated to the noisy x_t at
#      the input projection so the denoiser literally "sees" the clean
#      target frames.
#    - Direct fix for v8's keyframe-pop (CondMDI §3.1: imputation +
#      reconstruction-guidance both demonstrate jumps; only training-time
#      conditioning eliminates them).
#    - Random keyframes (vs v8's fixed semantic keyframes): teach generic
#      inbetweening capability rather than depend on a specific schema.
#
# 2. v-prediction target (Salimans & Ho 2022; Back-to-Basics §5.2).
#    - v = sqrt(ᾱ)·ε - sqrt(1-ᾱ)·x_0. Hybrid noise+clean target;
#      mitigates the mode-averaging frozen-body failure under rotation
#      reps that v6/v7/v8 (x_0-pred) all hit.
#    - x_0 is recovered analytically from v inside the sampler so anchor
#      / FK / L_pos losses still attach to clean-motion space.
#
# Other v9 changes:
#   - motion_representation: "smpl_pose_135_condmdi" (no offline keyframe
#     loading; random keyframes sampled inside step_fn).
#   - object_traj_dim: 24 (revert v8's keyframe-channel append; CondMDI
#     channel carries that signal more directly via cond_motion).
#   - Anchor loss reverts to v6/v7-style: all valid contact frames with
#     rule B stability mask. v8's "anchor-only-at-keyframes" gating was a
#     workaround for sparse keyframe info; CondMDI provides it densely.
#
# Trained from scratch (cond_motion_dim shape change cannot warm-start).

model:
  cfg_drop_prob: 0.15

  diffusion:
    num_steps: 1000
    schedule: "cosine"
    prediction_target: "v"          # v9: v-prediction (Salimans & Ho 2022)

  z_int:
    num_parts: 5
    phase_classes: 3
    support_classes: 3

  denoiser:
    motion_dim: 135                 # 22*6 (global rot 6D) + 3 (root world)
    object_traj_dim: 24             # COM 3 + rot6d 6 + 5 anchors world * 3
    cond_motion_dim: 136            # CondMDI channel: motion_dim 135 + obs_mask 1
    init_pose_dim: 66
    text_dim: 512
    object_token_dim: 256
    object_num_tokens: 128
    d_model: 512
    n_layers: 8
    n_heads: 4
    ff_mult: 4
    dropout: 0.1

  object_encoder:
    num_input_points: 1024
    num_output_tokens: 128
    feature_dim: 256

  text_encoder:
    clip_version: "ViT-B/32"
    download_root: "cache/clip"

data:
  datasets:
    - name: "chairs"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/chairs"
    - name: "imhd"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/imhd"
    - name: "neuraldome"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/neuraldome"
    - name: "omomo_correct_v2"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/omomo_correct_v2"
  pseudo_label_dir: null
  pseudo_label_subdir: "pseudo_labels/v18_h10_f05_pelvis20_official_semantic_marker"
  max_seq_length: 196
  support_collapse_hand_support: true
  motion_representation: "smpl_pose_135_condmdi"
  force_world_frame: true
  # Method-validation subsampling: shared seed with Stage A v11 + Stage 1.
  subsample_n_per_object: 10
  subsample_seed: 42

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42

  augmentation:
    enabled: true
    mirror_prob: 0.0                # rot 6D rep desync — must stay 0
    rotate_around_y_prob: 0.0
    pc_jitter_std: 0.005

training:
  init_checkpoint: null             # from scratch (cond_motion_dim shape change)
  batch_size: 16
  num_epochs: 80
  num_workers: 4
  seed: 42
  optimizer:
    name: "adamw"
    lr: 1.0e-4
    weight_decay: 0.01
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    warmup_steps: 500
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  mixed_precision: "bf16"
  val_every_epochs: 5
  val_best_key: "anchor_l2"

loss:
  anchor_weight: 1.0
  contact_threshold: 0.5

  motion_feature_weights:
    root_rot_vel: 1.0
    root_lin_vel: 1.0
    root_height_y: 1.0
    joint_pos_local: 1.0
    joint_rot_6d: 1.0
    joint_velocity: 1.0
    foot_contact: 1.0

  dynamic_metric:
    enabled: false
  motion_geometric:
    enabled: false

  world_joint_velocity_weight: 1.0
  fk_consistency_weight: 0.0
  pos_loss_weight: 5.0              # MDM L_pos full-body, dense temporal supervision

logging:
  project: "piano"
  run_name: "stageB_anchordiff_v9_condmdi"
  log_every_n_steps: 50
  save_every_n_epochs: 5

output_dir: "runs/training/stageB_anchordiff_v9_condmdi"
