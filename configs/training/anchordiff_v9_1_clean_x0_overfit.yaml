# V9.1 clean (one-clip overfit version) — first task per
# claude_code_v9_condmdi_diagnostic_next_steps.md §14:
#   "1. Create clean v9_1_clean_x0 config.
#    2. Verify it changes only prediction target from `v` to `x0`.
#    3. Run one-clip overfit.
#    4. Evaluate one-clip overfit at cfg=0/1, K=8 random/linspace"
#
# This file is anchordiff_v9_1_clean_x0.yaml + the overfit data switches
# (single dataset, overfit_n_clips=1, batch_size=1, 200 epochs, no augment,
# no val).

model:
  cfg_drop_prob: 0.15

  diffusion:
    num_steps: 1000
    schedule: "cosine"
    prediction_target: "x0"          # ← ONLY DIFF FROM V9 BASELINE (and overfit)

  z_int:
    num_parts: 5
    phase_classes: 3
    support_classes: 3

  denoiser:
    motion_dim: 135
    object_traj_dim: 24
    cond_motion_dim: 136
    init_pose_dim: 66
    text_dim: 512
    object_token_dim: 256
    object_num_tokens: 128
    d_model: 512
    n_layers: 8
    n_heads: 4
    ff_mult: 4
    dropout: 0.1

  object_encoder:
    num_input_points: 1024
    num_output_tokens: 128
    feature_dim: 256

  text_encoder:
    clip_version: "ViT-B/32"
    download_root: "cache/clip"

data:
  datasets:
    - name: "chairs"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/chairs"
  pseudo_label_dir: null
  pseudo_label_subdir: "pseudo_labels/v18_h10_f05_pelvis20_official_semantic_marker"
  max_seq_length: 196
  support_collapse_hand_support: true
  motion_representation: "smpl_pose_135_condmdi"
  force_world_frame: true
  subsample_n_per_object: 10
  subsample_seed: 42
  overfit_n_clips: 1                # diagnostic mode

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42

  augmentation:
    enabled: false
    mirror_prob: 0.0
    rotate_around_y_prob: 0.0
    pc_jitter_std: 0.0

training:
  init_checkpoint: null
  batch_size: 1
  num_epochs: 200
  num_workers: 0
  seed: 42
  optimizer:
    name: "adamw"
    lr: 1.0e-4
    weight_decay: 0.0
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    warmup_steps: 50
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  mixed_precision: "bf16"
  val_every_epochs: 0
  val_best_key: "anchor_l2"

loss:
  anchor_weight: 1.0
  contact_threshold: 0.5

  motion_feature_weights:
    root_rot_vel: 1.0
    root_lin_vel: 1.0
    root_height_y: 1.0
    joint_pos_local: 1.0
    joint_rot_6d: 1.0
    joint_velocity: 1.0
    foot_contact: 1.0

  dynamic_metric:
    enabled: false
  motion_geometric:
    enabled: false

  world_joint_velocity_weight: 1.0
  fk_consistency_weight: 0.0
  pos_loss_weight: 5.0

logging:
  project: "piano"
  run_name: "stageB_anchordiff_v9_1_clean_x0_overfit"
  log_every_n_steps: 10
  save_every_n_epochs: 50

output_dir: "runs/training/stageB_anchordiff_v9_1_clean_x0_overfit"
