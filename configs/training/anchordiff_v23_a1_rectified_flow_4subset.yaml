# V23: A1 architecture with ELF-inspired Rectified Flow / Flow Matching.
# Single-variable objective ablation vs v18:
#   DDPM cosine corruption/reverse process -> continuous-time RF path
#   z_t = t*x0 + (1-t)*eps, t=0 noise, t=1 data.
# No self-conditioning, no timewarp/mirror, no transition loss, no temporal modules.

model:
  cfg_drop_prob: 0.15

  diffusion:
    num_steps: 1000
    schedule: "cosine"
    objective: "rectified_flow"
    prediction_target: "x0"
    # Match ELF's t_eps=0.05; smoke with 1e-4 produced very large initial
    # velocity loss near t=1 because v=(x_pred-z)/(1-t).
    rf_eps_time: 0.05
    rf_time_schedule: "uniform"
    rf_denoiser_p_mean: -1.5
    rf_denoiser_p_std: 0.8
    rf_denoiser_noise_scale: 1.0
    rf_num_sampling_steps: 100
    rf_sampler_type: "rectified_flow_ode"
    rf_sde_gamma: 0.0

  z_int:
    num_parts: 5
    phase_classes: 3
    support_classes: 3

  zero_z_int_for_stageB: false
  zero_dense_contact_target_for_stageB: false
  zero_contact_state_for_stageB: false
  zero_contact_target_for_stageB: false
  zero_phase_for_stageB: false
  zero_support_for_stageB: false
  zero_plan_target_for_stageB: false

  denoiser:
    motion_dim: 135
    object_traj_dim: 24
    cond_motion_dim: 0
    init_pose_dim: 66
    text_dim: 512
    object_token_dim: 256
    object_num_tokens: 128
    use_interaction_plan: true
    plan_k_max: 12
    plan_s_max: 12
    plan_num_anchor_types: 5
    plan_num_parts: 5
    plan_use_segment_tokens: false
    plan_use_context_hint: true
    plan_d_hint: 32
    plan_d_time_embed: 64
    cfg_drop_plan: false
    plan_per_part_tokens: true
    plan_context_hint_mode: "target_aware"
    use_dit_block: true
    dit_block_use_plan_pool_in_cond: false
    use_v13_dynhead: false
    use_v13_temporal_conv: false
    use_self_conditioning: false
    self_conditioning_prob: 0.0
    d_model: 512
    n_layers: 8
    n_heads: 4
    ff_mult: 4
    dropout: 0.1

  object_encoder:
    num_input_points: 1024
    num_output_tokens: 128
    feature_dim: 256

  text_encoder:
    clip_version: "ViT-B/32"
    download_root: "cache/clip"

data:
  datasets:
    - name: "chairs"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/chairs"
    - name: "imhd"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/imhd"
    - name: "neuraldome"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/neuraldome"
    - name: "omomo_correct_v2"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/omomo_correct_v2"
  pseudo_label_dir: null
  pseudo_label_subdir: "pseudo_labels/v18_h10_f05_pelvis20_official_semantic_marker"
  max_seq_length: 196
  support_collapse_hand_support: true
  motion_representation: "smpl_pose_135_plan"
  force_world_frame: true
  subsample_n_per_object: null
  overfit_n_clips: 0

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42

  augmentation:
    enabled: false
    mirror_prob: 0.0
    rotate_around_y_prob: 0.0
    pc_jitter_std: 0.005

training:
  init_checkpoint: null
  batch_size: 16
  num_epochs: 80
  num_workers: 4
  seed: 42
  optimizer:
    name: "adamw"
    lr: 1.0e-4
    weight_decay: 0.01
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    warmup_steps: 500
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  mixed_precision: "bf16"
  val_every_epochs: 20
  val_best_key: "anchor_l2"

loss:
  anchor_weight: 1.0
  contact_threshold: 0.5
  plan_anchor_weight: 1.0
  plan_segment_weight: 0.0
  plan_transition_vel_weight: 1.0
  plan_transition_acc_weight: 1.0
  plan_transition_window: 3
  stable_root_vel_weight: 0.5
  stable_root_acc_weight: 0.25
  stable_support_erode: 4
  stable_local_vel_weight: 0.0
  stable_local_acc_weight: 0.0
  stable_local_vel_cm_weight: 0.0
  stable_local_speed_moment_weight: 0.0
  stable_local_acc_cm_weight: 0.0
  use_min_snr_weighting: false
  min_snr_gamma: 5.0
  motion_feature_weights:
    root_rot_vel: 1.0
    root_lin_vel: 1.0
    root_height_y: 1.0
    joint_pos_local: 1.0
    joint_rot_6d: 1.0
    joint_velocity: 1.0
    foot_contact: 1.0
  dynamic_metric:
    enabled: false
  motion_geometric:
    enabled: false
  world_joint_velocity_weight: 1.0
  fk_consistency_weight: 0.0
  pos_loss_weight: 5.0

logging:
  project: "piano"
  run_name: "stageB_anchordiff_v23_a1_rectified_flow_4subset"
  log_every_n_steps: 50
  save_every_n_epochs: 20

output_dir: "runs/training/stageB_anchordiff_v23_a1_rectified_flow_4subset"
