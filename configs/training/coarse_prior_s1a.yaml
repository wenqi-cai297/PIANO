# Stage-1 Coarse-v1 prior — S1-A (bidirectional self-attention).
#
# Round 12 baseline per analyses/2026-05-21_stage1_coarse_prior_literature_code_audit.md §11
# and analyses/2026-05-21_codex_stage1_coarse_prior_design_review.md §10.
#
# S1-A and S1-B configs MUST differ ONLY in:
#   - model.denoiser.attention_mode  ("none" here vs "block_causal" in S1-B)
#   - model.denoiser.block_size       (irrelevant when attention_mode=="none", but
#                                      kept identical for cleanliness)

model:
  diffusion:
    num_steps: 1000
    schedule: "cosine"

  denoiser:
    coarse_dim: 23
    text_dim: 512
    init_pose_dim: 23
    d_model: 384
    n_layers: 4
    n_heads: 4
    ff_mult: 4
    dropout: 0.1
    max_seq_length: 196
    # ---- The single varying knob between S1-A and S1-B ----
    attention_mode: "none"
    block_size: 16

data:
  cache_root: "cache/stage1_coarse_v1_round12"

training:
  batch_size: 16
  total_steps: 1000           # smoke ceiling per Round-12 spec; overridable via CLI
  num_workers: 0
  seed: 42
  cfg_drop_prob: 0.1
  mixed_precision: "no"        # smoke runs prefer fp32 to surface numerical issues
  gradient_accumulation_steps: 1
  optimizer:
    name: "adamw"
    lr: 1.0e-4
    weight_decay: 0.01
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    warmup_steps: 100

loss:
  # State-velocity loss (Codex §5.3) — applied only to STATE-like dims:
  #   root_local_trans [0:3], pelvis_rot6d [9:15], spine3_rot6d [15:21],
  #   head_height [21:22], shoulder_center_height [22:23].
  # Stored-velocity dims [3:6] (root_vel) and [8] (yaw_vel) are EXCLUDED
  # from state_velocity (else this term becomes an acceleration loss).
  state_velocity_weight: 1.0
  channel_weights:
    root_local_trans: 1.5
    root_vel: 2.5             # stored velocity emphasised here directly
    yaw_sincos: 1.0
    yaw_vel: 2.5              # stored velocity emphasised here directly
    pelvis_rot6d: 1.0
    spine3_rot6d: 1.0
    head_height: 0.5
    shoulder_height: 0.5

logging:
  project: "piano"
  run_name: "stage1_coarse_prior_s1a"
  wandb: true              # Round-13 final-polish + Round-14 follow-up:
                           # web-UI monitoring enabled. trainer adds the
                           # resolved seed as a suffix to the wandb run name
                           # (e.g. "stage1_coarse_prior_s1a_seed42") so the
                           # 6 paired-seed runs are distinct.
  group: "stage1_paired_s1a_vs_s1b"
  tags: ["round14", "stage1"]
  log_every_n_steps: 50

output_dir: "runs/training/stage1_coarse_prior_s1a"
