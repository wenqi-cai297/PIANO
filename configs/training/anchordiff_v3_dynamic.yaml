# PIANO-AnchorDiff v3: dynamic group-level MSE weighting (M1.5).
#
# Activate ONLY if v2 (anchordiff_v2_weighted) still shows root-rotation
# drift / spinning. v3 replaces hand-tuned static weights with
#
#     weight_g(epoch) = max(geometry_prior_g, static_floor_g)
#                       * residual_factor_g(epoch)
#
# Initial geometry_prior_g comes from offline finite-difference probes
# through recover_from_ric on a fixed val-split calibration set
# (analyses/2026-05-08_anchordiff_dynamic_metric/geometry_prior.json).
# residual_factor_g(epoch) is recomputed every K epochs from the current
# checkpoint on the SAME fixed calibration set, single-step denoising.
# Weights are EMA-smoothed, clamped, and renormalised to preserve v2's
# total MSE scale.
#
# Spec: PLAN.md M1.5 (sections "Step 1" through "Step 8").

model:
  cfg_drop_prob: 0.15

  diffusion:
    num_steps: 1000
    schedule: "cosine"

  z_int:
    num_parts: 5
    phase_classes: 3
    support_classes: 3

  denoiser:
    motion_dim: 263
    object_traj_dim: 9
    init_pose_dim: 66
    text_dim: 512
    object_token_dim: 256
    object_num_tokens: 128
    d_model: 512
    n_layers: 8
    n_heads: 4
    ff_mult: 4
    dropout: 0.1

  object_encoder:
    num_input_points: 1024
    num_output_tokens: 128
    feature_dim: 256

  text_encoder:
    clip_version: "ViT-B/32"
    download_root: "cache/clip"

data:
  datasets:
    - name: "chairs"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/chairs"
    - name: "imhd"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/imhd"
    - name: "neuraldome"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/neuraldome"
    - name: "omomo_correct_v2"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/omomo_correct_v2"
  pseudo_label_dir: null
  pseudo_label_subdir: "pseudo_labels/v18_h10_f05_pelvis20_official_semantic_marker"
  max_seq_length: 196
  support_collapse_hand_support: true

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42

  augmentation:
    enabled: true
    mirror_prob: 0.5
    rotate_around_y_prob: 1.0
    pc_jitter_std: 0.005

training:
  batch_size: 16
  num_epochs: 100
  num_workers: 4
  seed: 42
  optimizer:
    name: "adamw"
    lr: 1.0e-4
    weight_decay: 0.01
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    warmup_steps: 200
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  mixed_precision: "bf16"
  val_every_epochs: 5

loss:
  anchor_weight: 5.0
  contact_threshold: 0.5

  # Static base/floor weights (also used as base_prior_floor for groups
  # whose geometry_prior is ~0, e.g. joint_rot_6d / velocity / foot_contact
  # don't affect recover_from_ric).
  motion_feature_weights:
    root_rot_vel: 100.0
    root_lin_vel: 30.0
    root_height_y: 30.0
    joint_pos_local: 1.0
    joint_rot_6d: 1.0
    joint_velocity: 1.0
    foot_contact: 5.0

  # v2.1 dynamic group metric
  dynamic_metric:
    enabled: true
    geometry_prior_path: "analyses/2026-05-08_anchordiff_dynamic_metric/geometry_prior.json"
    calibration_clips: "analyses/2026-05-08_anchordiff_dynamic_metric/calibration_clips.json"
    update_every_epochs: 5
    ema_beta: 0.2
    residual_alpha: 0.5
    clamp_min: 0.25
    clamp_max: 150.0
    fixed_timestep: 200          # mid-noise level for single-step denoising
    calibration_seed: 12345

logging:
  project: "piano"
  run_name: "stageB_anchordiff_v3_dynamic"
  log_every_n_steps: 50
  save_every_n_epochs: 10

output_dir: "runs/training/stageB_anchordiff_v3_dynamic"
