# Stage C: Joint finetune config (predictor + generator + consistency)

model:
  config: configs/model/motion_generator.yaml
  predictor_config: configs/model/interaction_predictor.yaml
  object_encoder_config: configs/model/object_encoder.yaml
  text_encoder: "ViT-B/32"  # matching MoMask's CLIP model
  freeze_text_encoder: true
  freeze_predictor: false     # unfreeze all trainable modules
  predictor_checkpoint: "runs/training/predictor/best.pt"
  generator_checkpoint: "runs/training/generator/best.pt"

  extractor:
    # Lightweight interaction extractor for consistency loss
    num_layers: 3
    d_model: 256
    num_heads: 4
    dropout: 0.1

data:
  datasets:
    - name: "interact"
      root: "data/interact"
    - name: "omomo"
      root: "data/omomo"
  pseudo_label_dir: "runs/pseudo_labels"
  motion_repr: "humanml3d"
  max_seq_length: 196
  fps: 30

training:
  batch_size: 64
  num_epochs: 40
  optimizer:
    name: "adamw"
    lr: 1.0e-5              # reduced from stage A/B
    weight_decay: 0.01
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    warmup_steps: 500
  gradient_accumulation_steps: 2
  max_grad_norm: 1.0
  uncond_prob: 0.1

loss:
  # Predictor losses
  contact_weight: 1.0
  target_weight: 0.5
  phase_weight: 0.5
  support_weight: 0.5
  # Generator losses
  diffusion_weight: 1.0
  velocity_smoothness_weight: 0.01
  # Consistency loss
  consistency_weight: 0.5

priors:
  reachability_weight: 0.1
  contact_persistence_weight: 0.1
  support_smoothness_weight: 0.05
  phase_monotonicity_weight: 0.05

logging:
  project: "piano"
  run_name: "joint_finetune"
  log_every_n_steps: 50
  save_every_n_epochs: 5

output_dir: "runs/training/joint"
