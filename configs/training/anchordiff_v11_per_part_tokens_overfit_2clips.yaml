# V10 plan-tokens overfit (one-clip).
#
# First experimental run for the InteractionPlan reframe (per
# analyses/piano_interaction_plan_pipeline_reframe_for_claude_code.md
# §13 minimal first implementation):
#   1. rule-based InteractionPlanCompiler (compiled in dataloader)
#   2. anchor tokens only (no segment tokens)
#   3. PlanTokenEncoder
#   4. one cross-attention block from motion tokens to anchor tokens
#   5. GT-plan one-clip overfit
#   6. plan condition sensitivity diagnostic
#
# Single-variable change vs v9_4_hardobs_overfit:
#   data.motion_representation: smpl_pose_135_condmdi → smpl_pose_135_plan
#   denoiser.use_interaction_plan: false → true
#   denoiser.cond_motion_*: removed (no CondMDI keyframe channel in v10)
#   loss.plan_anchor_weight: 0 → 1.0
#   loss.plan_transition_vel_weight: 0 → 1.0  (light regulariser)
#   loss.plan_transition_acc_weight: 0 → 1.0
#
# CFG drop_plan stays False so cfg=0/1/3 sweeps measure semantic /
# text / object condition strength only. The plan-condition ablation
# (GT vs zero vs shuffled vs wrong-clip vs reversed) is run via
# scripts/stage_b_generator/plan_condition_diagnostics.py — that
# script feeds in different plan dicts under a fixed model + noise.
#
# Pass criteria (spec §9.2):
#   * GT plan unobs error ≥ 5 cm better than wrong/zero plan unobs error
#   * root_aligned_unobserved_error_cm improves vs v9_4 baseline
#   * transition_local_vel_jump_cm < 3 cm/frame OR ≥ 30% improvement
#   * plan-anchor contact realisation < 20 cm avg
#   * no frozen-body-plus-root-translation on visual sweep

model:
  cfg_drop_prob: 0.15

  diffusion:
    num_steps: 1000
    schedule: "cosine"
    prediction_target: "x0"

  z_int:
    num_parts: 5
    phase_classes: 3
    support_classes: 3

  denoiser:
    motion_dim: 135
    object_traj_dim: 24
    cond_motion_dim: 0                # v10: no CondMDI inpainting channel
    init_pose_dim: 66
    text_dim: 512
    object_token_dim: 256
    object_num_tokens: 128

    # v10 InteractionPlan flags
    use_interaction_plan: true
    plan_k_max: 12
    plan_s_max: 12
    plan_num_anchor_types: 5
    plan_num_parts: 5
    plan_use_segment_tokens: false    # spec §13: anchors only initially
    plan_use_context_hint: true       # per-frame relative-temporal hint
    plan_d_hint: 32
    plan_d_time_embed: 64
    cfg_drop_plan: false              # ablation flag; off for the first run

    # v11 per claude_code_v10_after_fkposfix_strategy.md §7
    plan_per_part_tokens: true        # one token per active (anchor, part) pair
    plan_context_hint_mode: "target_aware"  # hint encodes target_world + dom-part one-hot

    d_model: 512
    n_layers: 8
    n_heads: 4
    ff_mult: 4
    dropout: 0.1

  object_encoder:
    num_input_points: 1024
    num_output_tokens: 128
    feature_dim: 256

  text_encoder:
    clip_version: "ViT-B/32"
    download_root: "cache/clip"

data:
  datasets:
    - name: "chairs"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/chairs"
  pseudo_label_dir: null
  pseudo_label_subdir: "pseudo_labels/v18_h10_f05_pelvis20_official_semantic_marker"
  max_seq_length: 196
  support_collapse_hand_support: true
  motion_representation: "smpl_pose_135_plan"
  force_world_frame: true
  subsample_n_per_object: 10
  subsample_seed: 42
  overfit_n_clips: 2

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42

  augmentation:
    enabled: false
    mirror_prob: 0.0
    rotate_around_y_prob: 0.0
    pc_jitter_std: 0.0

training:
  init_checkpoint: null
  batch_size: 1
  num_epochs: 200
  num_workers: 0
  seed: 42
  optimizer:
    name: "adamw"
    lr: 1.0e-4
    weight_decay: 0.0
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    warmup_steps: 50
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  mixed_precision: "bf16"
  val_every_epochs: 0
  val_best_key: "anchor_l2"

loss:
  anchor_weight: 1.0
  contact_threshold: 0.5

  # v10 plan-aware losses
  plan_anchor_weight: 1.0           # sparse anchor realization (FK joints @ anchor times → world targets)
  plan_segment_weight: 0.0          # off in minimal v10 (spec §13 — anchors only)
  plan_transition_vel_weight: 1.0   # ±3-frame velocity MSE near anchors
  plan_transition_acc_weight: 1.0   # ±3-frame acceleration MSE near anchors
  plan_transition_window: 3

  motion_feature_weights:
    root_rot_vel: 1.0
    root_lin_vel: 1.0
    root_height_y: 1.0
    joint_pos_local: 1.0
    joint_rot_6d: 1.0
    joint_velocity: 1.0
    foot_contact: 1.0

  dynamic_metric:
    enabled: false
  motion_geometric:
    enabled: false

  world_joint_velocity_weight: 1.0
  fk_consistency_weight: 0.0
  pos_loss_weight: 5.0

logging:
  project: "piano"
  run_name: "stageB_anchordiff_v11_per_part_tokens_overfit_2clips"
  log_every_n_steps: 10
  save_every_n_epochs: 50

output_dir: "runs/training/stageB_anchordiff_v11_per_part_tokens_overfit_2clips"
