# PIANO-AnchorDiff v5: OMOMO/CHOIS-style 198-D global representation
# with FK consistency loss.
#
# Why this branch exists:
# - v4/v4b/v4d switched to 66-D world joint XYZ. This passed the
#   anchor_l2 ship gate (v4d 15.2 cm vs 28 cm threshold) but visual
#   review showed *skeletal distortion*: arms stretch to satisfy hand
#   anchors, hip is pulled out by false-positive pelvis pseudo-labels.
# - Pure 66-D joint position rep has NO skeletal-consistency constraint;
#   the model can independently move each joint XYZ.
# - OMOMO (SIGGRAPH-A 2023) and CHOIS (ECCV 2024 Oral) both use a
#   redundant (positions + global 6D rotations) representation tied
#   together by a FK consistency loss. CHOIS source:
#   chois_release@manip/model/transformer_object_motion_cond_diffusion.py:1448-1475
# - This config implements v5 198-D: 22*3 jpos + 22*6 global rot_6d.
#   FK consistency forces predicted positions = FK(predicted rotations,
#   per-clip rest_offsets), eliminating the limb-stretching failure.
#
# Design note:
#   analyses/2026-05-08_anchordiff_v5_omomo_198d_design.md

model:
  cfg_drop_prob: 0.15

  diffusion:
    num_steps: 1000
    schedule: "cosine"

  z_int:
    num_parts: 5
    phase_classes: 3
    support_classes: 3

  denoiser:
    motion_dim: 198               # = 22*3 (jpos) + 22*6 (global rot_6d)
    object_traj_dim: 24           # COM 3 + rot6d 6 + 5 anchors * 3 = 24, same as v4b/v4d
    init_pose_dim: 66
    text_dim: 512
    object_token_dim: 256
    object_num_tokens: 128
    d_model: 512
    n_layers: 8
    n_heads: 4
    ff_mult: 4
    dropout: 0.1

  object_encoder:
    num_input_points: 1024
    num_output_tokens: 128
    feature_dim: 256

  text_encoder:
    clip_version: "ViT-B/32"
    download_root: "cache/clip"

data:
  datasets:
    - name: "chairs"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/chairs"
    - name: "imhd"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/imhd"
    - name: "neuraldome"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/neuraldome"
    - name: "omomo_correct_v2"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/omomo_correct_v2"
  pseudo_label_dir: null
  pseudo_label_subdir: "pseudo_labels/v18_h10_f05_pelvis20_official_semantic_marker"
  max_seq_length: 196
  support_collapse_hand_support: true
  motion_representation: "joints22_world_with_rot6d"
  force_world_frame: true

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42

  # Augmentation must be DISABLED for the 198-D rep until the augment
  # pipeline learns to mirror/rotate global rot_6d in lock-step with
  # joint XYZ. Dataset class raises if either prob > 0.
  augmentation:
    enabled: true
    mirror_prob: 0.0
    rotate_around_y_prob: 0.0
    pc_jitter_std: 0.005

training:
  init_checkpoint: null           # from scratch — v4 warm-start would carry the wrong rep
  batch_size: 16
  num_epochs: 80
  num_workers: 4
  seed: 42
  optimizer:
    name: "adamw"
    lr: 1.0e-4
    weight_decay: 0.01
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    warmup_steps: 500
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  mixed_precision: "bf16"
  val_every_epochs: 5
  val_best_key: "anchor_l2"

loss:
  # Anchor weight matches v4b (10.0). v4d's 20.0 was too aggressive;
  # combined with FK consistency we don't need to compensate as hard.
  anchor_weight: 10.0
  contact_threshold: 0.5

  # No per-feature weighting on the 198-D rep — both halves get loss
  # uniformly. (Channel-space weighting was a motion_263 thing.)
  motion_feature_weights:
    root_rot_vel: 1.0
    root_lin_vel: 1.0
    root_height_y: 1.0
    joint_pos_local: 1.0
    joint_rot_6d: 1.0
    joint_velocity: 1.0
    foot_contact: 1.0

  dynamic_metric:
    enabled: false
  motion_geometric:
    enabled: false              # geometric losses (L_pos via recover_from_ric)
                                # are motion_263-specific; v5 has its own FK
                                # consistency loss instead.

  # World-frame velocity on jpos sub-vector (frame-difference MSE).
  # OMOMO uses jvel as a separate motion channel; we use it as a loss
  # which is informationally equivalent and saves 66 dims of denoising.
  world_joint_velocity_weight: 1.0

  # CHOIS-style FK consistency: predicted positions must equal FK of
  # predicted rotations under per-clip rest_offsets. Weight chosen to
  # roughly balance with anchor_weight (10) — empirically tunable.
  fk_consistency_weight: 5.0

logging:
  project: "piano"
  run_name: "stageB_anchordiff_v5_omomo_198d"
  log_every_n_steps: 50
  save_every_n_epochs: 5

output_dir: "runs/training/stageB_anchordiff_v5_omomo_198d"
