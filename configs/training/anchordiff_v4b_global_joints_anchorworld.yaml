# PIANO-AnchorDiff v4b: world-joint diffusion with world-anchor conditioning.
#
# v4a confirmed the representation switch helps validation anchor loss, but
# full DDPM samples still under-bind hands to tools. v4b keeps the 66-D
# world-joint target and appends the five predicted/GT body-part anchor
# targets transformed into world frame (5 * 3 = 15 dims) to the per-frame
# object trajectory channel.

model:
  cfg_drop_prob: 0.15

  diffusion:
    num_steps: 1000
    schedule: "cosine"

  z_int:
    num_parts: 5
    phase_classes: 3
    support_classes: 3

  denoiser:
    motion_dim: 66
    object_traj_dim: 24   # object COM 3 + object rot6d 6 + world anchors 15
    init_pose_dim: 66
    text_dim: 512
    object_token_dim: 256
    object_num_tokens: 128
    d_model: 512
    n_layers: 8
    n_heads: 4
    ff_mult: 4
    dropout: 0.1

  object_encoder:
    num_input_points: 1024
    num_output_tokens: 128
    feature_dim: 256

  text_encoder:
    clip_version: "ViT-B/32"
    download_root: "cache/clip"

data:
  datasets:
    - name: "chairs"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/chairs"
    - name: "imhd"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/imhd"
    - name: "neuraldome"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/neuraldome"
    - name: "omomo_correct_v2"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/omomo_correct_v2"
  pseudo_label_dir: null
  pseudo_label_subdir: "pseudo_labels/v18_h10_f05_pelvis20_official_semantic_marker"
  max_seq_length: 196
  support_collapse_hand_support: true
  motion_representation: "joints22_world"
  force_world_frame: true

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42

  augmentation:
    enabled: true
    mirror_prob: 0.5
    rotate_around_y_prob: 1.0
    pc_jitter_std: 0.005

training:
  init_checkpoint: "runs/training/stageB_anchordiff_v4_global_joints/best_val.pt"
  partial_init_allow_shape_mismatch: true
  batch_size: 16
  num_epochs: 40
  num_workers: 4
  seed: 43
  optimizer:
    name: "adamw"
    lr: 3.0e-5
    weight_decay: 0.01
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    warmup_steps: 200
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  mixed_precision: "bf16"
  val_every_epochs: 5
  val_best_key: "anchor_l2"

loss:
  anchor_weight: 10.0
  contact_threshold: 0.5
  world_joint_velocity_weight: 0.5
  motion_geometric:
    enabled: false

logging:
  project: "piano"
  run_name: "stageB_anchordiff_v4b_global_joints_anchorworld"
  log_every_n_steps: 50
  save_every_n_epochs: 5

output_dir: "runs/training/stageB_anchordiff_v4b_global_joints_anchorworld"
