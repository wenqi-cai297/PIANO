# PIANO-AnchorDiff v6: SMPL pose-space output (135-D), geometric skeleton.
#
# Why v6 exists:
# - v4 (66-D world jpos) and v5 (198-D = jpos + rot_6d + FK consistency)
#   both pass the anchor ship gate (15.2 / 14.5 cm) but **fail visual
#   review** with skeleton distortion (arms stretch to satisfy hand
#   anchors, hip pulled by false-positive pelvis labels).
# - Soft FK consistency loss in v5 isn't enough — free-form jpos in the
#   motion vector can still drift.
# - v6 drops jpos from the motion vector entirely. motion = (rot_6d, root)
#   only; jpos derived by FK every step. Bone lengths are now
#   geometrically locked.
#
# Design doc:
#   analyses/2026-05-09_anchordiff_v6_smpl_pose_design.md

model:
  cfg_drop_prob: 0.15

  diffusion:
    num_steps: 1000
    schedule: "cosine"

  z_int:
    num_parts: 5
    phase_classes: 3
    support_classes: 3

  denoiser:
    motion_dim: 135               # = 22*6 (global rot 6D) + 3 (root world)
    object_traj_dim: 24           # COM 3 + rot6d 6 + 5 anchors * 3 (v4b/v5/v6 all use this)
    init_pose_dim: 66
    text_dim: 512
    object_token_dim: 256
    object_num_tokens: 128
    d_model: 512
    n_layers: 8
    n_heads: 4
    ff_mult: 4
    dropout: 0.1

  object_encoder:
    num_input_points: 1024
    num_output_tokens: 128
    feature_dim: 256

  text_encoder:
    clip_version: "ViT-B/32"
    download_root: "cache/clip"

data:
  datasets:
    - name: "chairs"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/chairs"
    - name: "imhd"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/imhd"
    - name: "neuraldome"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/neuraldome"
    - name: "omomo_correct_v2"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/omomo_correct_v2"
  pseudo_label_dir: null
  # v6 first runs use v18 labels (v19 extraction running in parallel; switch
  # to v19 subdir once extraction completes for chairs subset at minimum).
  pseudo_label_subdir: "pseudo_labels/v18_h10_f05_pelvis20_official_semantic_marker"
  max_seq_length: 196
  support_collapse_hand_support: true
  motion_representation: "smpl_pose_135"
  force_world_frame: true

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42

  # v5/v6 don't sync mirror/Y-rot through global rot 6D yet — the dataset
  # raises if either prob > 0. Only pc_jitter is allowed.
  augmentation:
    enabled: true
    mirror_prob: 0.0
    rotate_around_y_prob: 0.0
    pc_jitter_std: 0.005

training:
  init_checkpoint: null           # from scratch; v4/v5 weights are 66/198-D incompatible
  batch_size: 16
  num_epochs: 80
  num_workers: 4
  seed: 42
  optimizer:
    name: "adamw"
    lr: 1.0e-4
    weight_decay: 0.01
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    warmup_steps: 500
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  mixed_precision: "bf16"
  val_every_epochs: 5
  val_best_key: "anchor_l2"

loss:
  # Anchor weight back to v4-base (5.0). v4d's 20.0 was overcompensating
  # for the v4 free-form jpos rep weakness; v6 doesn't need that high a
  # weight because the rep is now constrained.
  anchor_weight: 5.0
  contact_threshold: 0.5

  # No per-feature weighting on 135-D rep (rep is uniform: 132 rotation +
  # 3 translation; no semantic group structure like motion_263).
  motion_feature_weights:
    root_rot_vel: 1.0
    root_lin_vel: 1.0
    root_height_y: 1.0
    joint_pos_local: 1.0
    joint_rot_6d: 1.0
    joint_velocity: 1.0
    foot_contact: 1.0

  dynamic_metric:
    enabled: false
  motion_geometric:
    enabled: false              # motion_263-only; v6 has anchor_loss on FK output

  # v6 uses world_joint_velocity_weight on the full 135-D rep (frame-diff
  # MSE on rot_6d penalises angular jitter; on root penalises root jitter).
  world_joint_velocity_weight: 1.0

  # FK consistency dropped — v6's FK is deterministic, no soft tie needed.
  fk_consistency_weight: 0.0

logging:
  project: "piano"
  run_name: "stageB_anchordiff_v6_smpl_pose_135"
  log_every_n_steps: 50
  save_every_n_epochs: 5

output_dir: "runs/training/stageB_anchordiff_v6_smpl_pose_135"
