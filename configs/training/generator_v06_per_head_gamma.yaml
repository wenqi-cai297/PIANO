# Stage B v0.6: per-head γ adapter (LLaMA-Adapter ICLR'24 pattern).
#
# Single-variable change from v0.4: γ_int gate goes from per-layer scalar
# (8 dof total) to per-head scalar (6 heads × 8 layers = 48 dof). Same
# encoder normalization, same body-canonical frame, same 80 epochs.
#
# Why now (post-B0 measurement, see analyses/2026-04-27_v0_5_premise_review.md):
#
# B0 contact-distance measurement on v0.4 (commit 65b9623) measured
# d_codebook = 0.8 cm (7.7%) and d_model = 9.6 cm (92.3%) of the
# 10.4 cm total contact-distance gap. Codebook decisively NOT the
# bottleneck (v0.3-γ retrain stays cancelled). The model side has
# 9.6 cm of headroom, with the failure localized to hand-reach
# specifically: hands +17.5 cm gap vs feet +2-12 cm gap.
#
# Per-head γ is the cheapest architectural intervention that targets
# this failure mode: 6 heads can learn different attention patterns
# (one head focuses on object com, another on hand-relevant body
# parts, etc.), gated independently. The per-layer scalar in v0.1-v0.5
# forced all heads to share a single gain knob — a structural cap on
# how task-specific the IntXAttn output can be.
#
# Reference recipe:
#   OpenGVLab/LLaMA-Adapter@alpaca_finetuning_v1/llama/model.py
#     self.gate = nn.Parameter(torch.zeros(1, n_heads, 1, 1))
#   Zhang et al. *LLaMA-Adapter: Efficient Fine-tuning of Language
#   Models with Zero-init Attention.* ICLR 2024. arXiv:2303.16199.
#
# Single-var override of v0.4 — every other knob (frame, lr, epochs,
# CFG buckets, normalization) stays identical so the comparison is
# clean. This trains in parallel with v0.5's 160-epoch run on the
# second GPU (no resource conflict — both are 5M-trainable-param,
# bf16, single-GPU-fits).
#
# Decision rule post-v0.6:
#   - mean_min_dist_per_frame drops by ≥ 5 cm vs v0.4 (10.4 → < ~5 cm
#     → ship Stage C).
#   - mean_min_dist_per_frame drops 1-5 cm → partial win; combine with
#     v0.3-δ trainable-copy as next.
#   - drops < 1 cm → architectural family insufficient; jump to v0.3-δ
#     trainable-copy InterControl.
#
# Hardware target: 2 × NVIDIA A6000 (48 GB each), bf16, Accelerate DDP.
# Wallclock: ~13 min (same as v0.4); per-head γ adds 40 params, no
# meaningful change in step time.
#
# Launch:
#   accelerate launch --config_file configs/accelerate_config.yaml \
#     -m piano.training.train_generator \
#     --config configs/training/generator_v06_per_head_gamma.yaml
#
# Eval (same five clips as v0.4 to keep the comparison aligned):
#   python scripts/stage_b_generator/qual_eval.py \
#     --config configs/training/generator_v06_per_head_gamma.yaml \
#     --ckpt runs/training/generator_v06_per_head_gamma/best_val.pt \
#     --output-dir runs/eval/stageB_v0_6_qual --w-int-sweep
#   python scripts/stage_b_generator/measure_contact_distance.py \
#     --input-dir runs/eval/stageB_v0_6_qual/full \
#     --input-dir runs/eval/stageB_v0_6_qual/text_only \
#     --input-dir runs/eval/stageB_v0_6_qual/swap \
#     --input-dir runs/eval/stageB_v0_4_gt_roundtrip/gt_original \
#     --input-dir runs/eval/stageB_v0_4_gt_roundtrip/gt_roundtrip \
#     --output-dir runs/eval/stageB_v0_6_contact_dist

model:
  config: configs/model/motion_generator.yaml
  text_encoder: "ViT-B/32"
  # *** v0.6 delta — per-head γ gate (overrides motion_generator.yaml default "scalar") ***
  gamma_kind: "per_head"
  checkpoints:
    vq_vae: "checkpoints/momask/t2m/rvq_nq6_dc512_nc512_noshare_qdp0.2/model/net_best_fid.tar"
    masked_transformer: "checkpoints/momask/t2m/t2m_nlayer8_nhead6_ld384_ff1024_cdp0.1_rvq6ns/model/latest.tar"

data:
  datasets:
    - name: "chairs"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/chairs"
    - name: "imhd"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/imhd"
    - name: "neuraldome"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/neuraldome"
    - name: "omomo_correct_v2"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/omomo_correct_v2"
  pseudo_label_dir: null
  motion_repr: "humanml3d"
  max_seq_length: 196
  fps: 20

  force_world_frame: false      # body-canonical, same as v0.4

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42
    split: "train"

  object_split:
    enabled: false
    train_pct: 85
    val_pct: 8
    test_pct: 7
    seed: 42
    split: "train"

  augmentation:
    enabled: false
    mirror_prob: 0.0
    rotate_around_y_prob: 0.0
    pc_jitter_std: 0.0

training:
  seed: 42
  batch_size: 32
  num_epochs: 80                 # same as v0.4 — single-var test
  num_workers: 4
  mixed_precision: "bf16"

  optimizer:
    name: "adamw"
    new_lr: 1.0e-4
    backbone_lr: 5.0e-5
    weight_decay: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: "cosine"
    warmup_steps: 1000

  gradient_accumulation_steps: 2
  max_grad_norm: 1.0

  cfg_drop_buckets:
    drop_both: 0.10
    drop_int_only: 0.10
    drop_text_only: 0.05

  val_every_epochs: 5
  val_best_key: "loss"

  # B1 — Contact-aware checkpointing. Per
  # analyses/2026-04-28_v0_3_delta_retrain_and_v0_5_contact.md, the
  # masked-CE val loss is empirically decoupled from the geometric
  # contact-distance ship metric (v0.4 → v0.5 ablation: CE↓ contact↑;
  # v0.5 → v0.6: CE↑ contact↓). When enabled, we additionally save
  # `best_contact.pt` selected on the fixed-mini-batch contact metric.
  # Cost ~1 sec/clip on bf16 / 2× A6000; for 5 clips × 16 val intervals
  # in an 80-epoch run this is ~80 sec total overhead. The fixed batch
  # is the first ``num_clips`` val clips (val_dataloader uses
  # shuffle=False so this is deterministic). w_text/w_int match
  # qual_eval.py defaults so during-training contact metric is
  # comparable to the offline B0 measurement.
  contact_eval:
    enabled: true
    num_clips: 5
    w_text: 4.0
    w_int: 2.0
    best_key: "mean_min_dist"

logging:
  project: "piano"
  run_name: "predictor_stageB_v06_per_head_gamma"
  log_every_n_steps: 50
  save_every_n_epochs: 5

# Separate output dir to preserve v0.4 / v0.5 ckpts for comparison.
output_dir: "runs/training/generator_v06_per_head_gamma"
