# Round-23 P1 no-plan ablation — paired companion to
# anchordiff_v25_round23_clean_alibi_FULL_DATA.yaml.
#
# Only differences vs the with-plan config:
#   - model.denoiser.plan_tokens_force_null = true
#     (replaces plan_tokens + plan_hint with null embeddings inside
#      _forward_v12, regardless of cond_drop_mask)
#   - All plan-aware loss weights set to 0 (else the model would still
#     receive plan info as SUPERVISION even though denied as CONDITIONING
#     — would defeat the ablation).
#
# Decision-rule:
#   - if with-plan run substantially beats no-plan on anchor_l2 /
#     pos_full / plan_condition_diagnostics §7.4 gate → plan condition
#     IS load-bearing; ALiBi + future architecture work justified.
#   - if no-plan ≈ with-plan → plan is redundant at this scale; consider
#     dropping the interaction_plan branch entirely in a simplified
#     v26 mainline.

model:
  cfg_drop_prob: 0.15

  diffusion:
    num_steps: 1000
    schedule: "cosine"
    prediction_target: "x0"

  z_int:
    num_parts: 5
    phase_classes: 3
    support_classes: 3

  # CLEAN contract (Round-22 audit §5.1): kill dense z_int + lifted target.
  zero_z_int_for_stageB: true
  zero_dense_contact_target_for_stageB: true
  zero_contact_state_for_stageB: true
  zero_contact_target_for_stageB: true
  zero_phase_for_stageB: true
  zero_support_for_stageB: true
  zero_plan_target_for_stageB: false

  denoiser:
    motion_dim: 135
    object_traj_dim: 9                       # CLEAN: pose only
    cond_motion_dim: 0
    init_pose_dim: 66
    text_dim: 512
    object_token_dim: 256
    object_num_tokens: 128
    use_interaction_plan: true
    plan_k_max: 12
    plan_s_max: 12
    plan_num_anchor_types: 5
    plan_num_parts: 5
    plan_use_segment_tokens: false
    plan_use_context_hint: true
    plan_d_hint: 32
    plan_d_time_embed: 64
    cfg_drop_plan: false
    plan_per_part_tokens: true
    plan_context_hint_mode: "target_aware"
    use_dit_block: true
    dit_block_use_plan_pool_in_cond: false
    use_v13_dynhead: false
    use_v13_temporal_conv: false
    d_model: 512
    n_layers: 8
    n_heads: 4
    ff_mult: 4
    dropout: 0.1
    # Round-22: Stage-1 coarse oracle condition.
    stage1_coarse_dim: 23
    cfg_drop_stage1_coarse: false
    # Round-23: ALiBi relative-time bias on plan cross-attention.
    plan_xattn_relative_time_bias: true
    plan_xattn_time_bias_init: 0.5
    # Round-23: no-plan ablation flag ON. Plan tokens + hint are
    # replaced by their learned null embeddings inside _forward_v12
    # — model gets no plan condition signal.
    plan_tokens_force_null: true

  object_encoder:
    num_input_points: 1024
    num_output_tokens: 128
    feature_dim: 256

  text_encoder:
    clip_version: "ViT-B/32"
    download_root: "cache/clip"

data:
  datasets:
    - name: "chairs"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/chairs"
    - name: "imhd"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/imhd"
    - name: "neuraldome"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/neuraldome"
    - name: "omomo_correct_v2"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/omomo_correct_v2"
  pseudo_label_dir: null
  pseudo_label_subdir: "pseudo_labels/v18_h10_f05_pelvis20_official_semantic_marker"
  max_seq_length: 196
  support_collapse_hand_support: true
  motion_representation: "smpl_pose_135_plan"
  force_world_frame: true
  subsample_n_per_object: null               # ~8363 train clips, matches v18
  overfit_n_clips: 0
  stage1_coarse_cache_root: "cache/stage1_coarse_v1_full"

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42

  augmentation:
    enabled: false
    mirror_prob: 0.0
    rotate_around_y_prob: 0.0
    pc_jitter_std: 0.005

training:
  init_checkpoint: null
  batch_size: 16
  num_epochs: 80                              # matches v18 mainline duration
  num_workers: 4
  seed: 42
  optimizer:
    name: "adamw"
    lr: 1.0e-4
    weight_decay: 0.01
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    warmup_steps: 500
  gradient_accumulation_steps: 4               # effective bs = 64
  max_grad_norm: 1.0
  mixed_precision: "bf16"
  val_every_epochs: 20                         # 4 val passes total
  val_best_key: "anchor_l2"

loss:
  anchor_weight: 1.0
  contact_threshold: 0.5
  # Round-23 no-plan ablation: zero all plan-aware loss weights so the
  # model isn't supervised against plan-anchor / plan-transition targets
  # while being denied plan conditioning.
  plan_anchor_weight: 0.0
  plan_segment_weight: 0.0
  plan_transition_vel_weight: 0.0
  plan_transition_acc_weight: 0.0
  plan_transition_window: 3
  stable_root_vel_weight: 0.5
  stable_root_acc_weight: 0.25
  stable_support_erode: 4
  stable_local_vel_weight: 0.0
  stable_local_acc_weight: 0.0
  stable_local_vel_cm_weight: 0.0
  stable_local_speed_moment_weight: 0.0
  stable_local_acc_cm_weight: 0.0
  # Round-20: Min-SNR-γ x0-pred weighting (Hang et al. ICCV 2023).
  use_min_snr_weighting: true
  min_snr_gamma: 5.0
  motion_feature_weights:
    root_rot_vel: 1.0
    root_lin_vel: 1.0
    root_height_y: 1.0
    joint_pos_local: 1.0
    joint_rot_6d: 1.0
    joint_velocity: 1.0
    foot_contact: 1.0
  dynamic_metric:
    enabled: false
  motion_geometric:
    enabled: false
  world_joint_velocity_weight: 1.0
  fk_consistency_weight: 0.0
  pos_loss_weight: 5.0

logging:
  project: "piano"
  run_name: "stageB_anchordiff_v25_round23_noplan_clean_alibi_FULL_DATA"
  log_every_n_steps: 50
  save_every_n_epochs: 20

output_dir: "runs/training/stageB_anchordiff_v25_round23_noplan_clean_alibi_FULL_DATA"
