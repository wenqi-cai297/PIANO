# Stage B: Motion Generator finetune config.
#
# Hardware target: 2 × NVIDIA A6000 (48 GB each), bf16, Accelerate DDP.
# Effective batch per optimizer step = per_gpu (32) × num_gpu (2) × accum (2) = 128.
# Dataset: same v11 InterAct pseudo-labels as Stage A (3-class phase,
# closest-point xyz GT), same by-subject 85/15 split, ~6800 train clips.
#
# Launch:
#   accelerate launch --config_file configs/accelerate_config.yaml \
#     -m piano.training.train_generator --config configs/training/generator.yaml

model:
  config: configs/model/motion_generator.yaml
  text_encoder: "ViT-B/32"      # MoMask's CLIP version (frozen inside MaskTransformer)
  # MoMask pretrained checkpoint paths. The MaskTransformer ckpt is
  # what we finetune; VQ-VAE and ResidualTransformer stay frozen.
  # See analyses/early_setup.md for ``_sw`` suffix gotcha.
  checkpoints:
    vq_vae: "checkpoints/momask/rvq_nq6_dc512_nc512_noshare_qdp0.2/model/net_best_fid.tar"
    masked_transformer: "checkpoints/momask/t2m_nlayer8_nhead6_ld384_ff1024_cdp0.1_rvq6ns/model/latest.tar"

data:
  # Same 4 InterAct subset roots as Stage A. Stage B reads
  # contact_state / contact_target_xyz / phase / support directly
  # from each clip's pseudo_labels npz — no extraction step needed.
  datasets:
    - name: "chairs"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/chairs"
    - name: "imhd"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/imhd"
    - name: "neuraldome"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/neuraldome"
    - name: "omomo_correct_v2"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/omomo_correct_v2"
  pseudo_label_dir: null         # use <root>/pseudo_labels per subset
  motion_repr: "humanml3d"       # 263-dim
  max_seq_length: 196            # 196 frames @ 20 fps (= 9.8 s)
  fps: 20

  # Use the SAME by-subject split as Stage A (seed=42). This way the
  # Stage B "val" loader holds the same subjects the Stage A predictor
  # of record (final.pt) never saw — relevant if we ever switch
  # train-time conditioning from GT to predictor output (Stage 4
  # joint finetune; see analyses/2026-04-26_stageB_design.md §4.2).
  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42
    split: "train"

  # Reserved for the secondary novel-object ablation table.
  object_split:
    enabled: false
    train_pct: 85
    val_pct: 8
    test_pct: 7
    seed: 42
    split: "train"

  # Augmentation is applied at the HOI dataset level, not the motion
  # level. MIRROR is OFF for Stage B because mirroring HumanML3D
  # 263-dim motion + the matching VQ-VAE codebook is not trivial
  # (the codebook is L/R-asymmetric since it learned from non-mirrored
  # HumanML3D). PC jitter on the object cloud is fine but unused
  # because the Stage B model doesn't see the object cloud — only
  # the predicted z_int does (via Stage A predictor at inference).
  # Y-rotation is invariant for z_int (object-local labels) but
  # affects the motion 263-d → token IDs would shift. Disabled to
  # keep token-space supervision aligned.
  augmentation:
    enabled: false
    mirror_prob: 0.0
    rotate_around_y_prob: 0.0
    pc_jitter_std: 0.0

training:
  seed: 42
  # Per-GPU batch. MoMask's HumanML3D config uses batch=64 on a single
  # 24GB GPU — we have 48GB A6000 per card so 32 per GPU × 2 GPUs ×
  # accum 2 = 128 effective is conservative. Bump after first run.
  batch_size: 32
  num_epochs: 80                 # MoMask trained for ~500K iters at bs=64
                                 # ≈ 80 epochs at our (8104 clips / bs 32) cadence;
                                 # finetune is shorter than from-scratch so this is
                                 # the natural stopping point.
  num_workers: 4
  mixed_precision: "bf16"

  optimizer:
    name: "adamw"
    # Two-group LRs: new params (IntXAttn / γ / null_int_kv / tokenizer)
    # at full LR, MoMask backbone finetune at half-rate. ControlNet /
    # LLaMA-Adapter convention. SPEC §8.3 originally had backbone=5e-5
    # / new=1e-4; we keep that ratio.
    new_lr: 1.0e-4
    backbone_lr: 5.0e-5
    weight_decay: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: "cosine"
    # 1000 steps ≈ 10% of total — generous warmup since the new
    # IntXAttn modules need to come off zero-init smoothly without
    # destabilising the pretrained backbone.
    warmup_steps: 1000

  gradient_accumulation_steps: 2
  max_grad_norm: 1.0

  # Compositional CFG drop buckets (per design §2.2).
  # Mutually exclusive 4-way split; "keep both" = 1 - sum(below) = 0.75.
  cfg_drop_buckets:
    drop_both: 0.10              # → fully unconditional branch
    drop_int_only: 0.10          # → text-only branch (matches MoMask's behaviour)
    drop_text_only: 0.05         # → interaction-only branch (small p; mostly
                                 #   needed for the inference CFG arithmetic)
  # 0.75 keep-both is implicit.

  # Keep-best-val every N epochs. MoMask training did not use a val-loss
  # selector for FID (it ran the eval pipeline directly), but matching
  # FID/R-Precision in-loop requires the HumanML3D eval assets which we
  # haven't loaded yet (see PROGRESS.md §2). For now we track the same
  # masked-CE loss the model trains on; switch to FID once eval assets
  # land. ``val_every_epochs=0`` would disable.
  val_every_epochs: 5
  val_best_key: "loss"

logging:
  project: "piano"
  run_name: "generator_stageB_v0_1"
  log_every_n_steps: 50
  save_every_n_epochs: 5

output_dir: "runs/training/generator"
