# Round-27 Tier-0B2 - temporal interaction losses ONLY, 48-clip overfit, warm-started from R23 (v25 no-plan FULL_DATA) final.pt.
# Tests whether the v27 fine-tune basin is too rigid for the temporal losses to escape (roadmap S10.2 case 2).
#
# Per piano_stage2_full_architecture_roadmap.md §7 / §8.5 / §10.2:
#   "Can stronger temporal/contact/gait losses ALONE repair the
#    observed failures, without adding oracle interaction hints?
#    If B1 succeeds, Tier-2 (full v28-style training) is justified.
#    If B1 fails but T0-B2 (same losses from R23 init) succeeds, the
#    v27 fine-tune basin is too rigid."
#
# Loss weights from roadmap §7.11 (aggressive overfit weights — point
# is to test whether the model can be steered at all):
#   contact_rel_offset_weight   = 10.0
#   contact_drift_weight        = 10.0
#   contact_tracking_weight     =  5.0
#   gait_both_airborne_weight   =  3.0
#   gait_stance_velocity_weight =  5.0
#
# Configuration choices (vs v27):
#   - model.denoiser.use_oracle_interaction_hint: false (T0-B is loss-only)
#   - data.use_oracle_interaction_hint: false
#   - data.surface_temporal_aux_fields: true (need walking_mask + foot_stance_gt)
#   - loss.temporal_interaction.*: per-term weights from roadmap §7.11
#   - training.init_checkpoint: R23 final.pt (warm-start)
#   - data.subset_indices_file: analyses/round27_tier0_train_indices_48_balanced.json
#   - training.num_epochs: 300

model:
  cfg_drop_prob: 0.15

  diffusion:
    num_steps: 1000
    schedule: "cosine"
    prediction_target: "x0"



  denoiser:
    motion_dim: 135
    object_traj_dim: 9
    cond_motion_dim: 0
    init_pose_dim: 66
    text_dim: 512
    object_token_dim: 256
    object_num_tokens: 128
    use_v13_dynhead: false
    use_v13_temporal_conv: false
    d_model: 512
    n_layers: 8
    n_heads: 4
    ff_mult: 4
    dropout: 0.1
    stage1_coarse_dim: 23
    # T0-B2: NO oracle hint (loss-only diagnostic).
    use_oracle_interaction_hint: false
    oracle_hint_dim: 0

  object_encoder:
    num_input_points: 1024
    num_output_tokens: 128
    feature_dim: 256

  text_encoder:
    clip_version: "ViT-B/32"
    download_root: "cache/clip"

data:
  datasets:
    - name: "chairs"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/chairs"
    - name: "imhd"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/imhd"
    - name: "neuraldome"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/neuraldome"
    - name: "omomo_correct_v2"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/omomo_correct_v2"
  pseudo_label_dir: null
  pseudo_label_subdir: "pseudo_labels/v18_h10_f05_pelvis20_official_semantic_marker"
  max_seq_length: 196
  support_collapse_hand_support: true
  motion_representation: "smpl_pose_135_plan"
  force_world_frame: true
  subsample_n_per_object: null
  overfit_n_clips: 0
  stage1_coarse_cache_root: "cache/stage1_coarse_v1_full"
  subset_indices_file: "analyses/round27_tier0_train_indices_48_balanced.json"
  # T0-B: no oracle hint, but DO surface walking_mask + foot_stance_gt
  # in the batch so the temporal losses can run.
  use_oracle_interaction_hint: false
  oracle_hint_variant: "full"
  oracle_hint_fps: 20.0
  surface_temporal_aux_fields: true

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42

  augmentation:
    enabled: false
    mirror_prob: 0.0
    rotate_around_y_prob: 0.0
    pc_jitter_std: 0.0

training:
  init_checkpoint: "runs/training/stageB_anchordiff_v25_round23_noplan_clean_alibi_FULL_DATA/final.pt"
  batch_size: 8
  num_epochs: 300
  num_workers: 4
  seed: 42
  stage1_coarse_noise_std: 0.0
  optimizer:
    name: "adamw"
    lr: 5.0e-5
    weight_decay: 0.01
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    warmup_steps: 50
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  mixed_precision: "bf16"
  val_on_train_subset: true
  val_every_epochs: 50
  val_best_key: "loss_contact_rel"

loss:
  anchor_weight: 0.0
  contact_threshold: 0.5


  stable_root_vel_weight: 0.5
  stable_root_acc_weight: 0.25
  stable_support_erode: 4
  stable_local_vel_weight: 0.0
  stable_local_acc_weight: 0.0
  stable_local_vel_cm_weight: 0.05
  stable_local_speed_moment_weight: 0.02
  stable_local_acc_cm_weight: 0.0

  hand_endpoint_weight: 2.0
  foot_endpoint_weight: 2.0
  pos_loss_weight: 5.0

  anchor_joint_pos_weight: 10.0
  anchor_joint_vel_weight: 2.0
  anchor_joint_part_weights: [2.0, 2.0, 0.0, 0.0, 0.5]

  # Round-27 Tier-0B temporal interaction losses (roadmap §7.11 weights).
  temporal_interaction:
    contact_rel_offset_weight: 10.0
    contact_drift_weight: 10.0
    contact_tracking_weight: 5.0
    gait_both_airborne_weight: 3.0
    gait_stance_velocity_weight: 5.0
    contact_threshold: 0.5
    contact_rel_clamp_m: 2.0
    tracking_margin_m: 0.03
    tracking_min_obj_disp_m: 0.05
    floor_quantile: 0.05
    grounded_threshold_above_floor_m: 0.10
    grounded_softness_m: 0.03

  use_min_snr_weighting: true
  min_snr_gamma: 5.0
  motion_feature_weights:
    root_rot_vel: 1.0
    root_lin_vel: 1.0
    root_height_y: 1.0
    joint_pos_local: 1.0
    joint_rot_6d: 1.0
    joint_velocity: 1.0
    foot_contact: 1.0
  dynamic_metric:
    enabled: false
  motion_geometric:
    enabled: false
  world_joint_velocity_weight: 1.0
  fk_consistency_weight: 0.0

logging:
  project: "piano"
  run_name: "stageB_anchordiff_t0b2_temporal_losses_48clip_from_r23"
  log_every_n_steps: 10
  save_every_n_epochs: 50

output_dir: "runs/training/stageB_anchordiff_t0b2_temporal_losses_48clip_from_r23"
