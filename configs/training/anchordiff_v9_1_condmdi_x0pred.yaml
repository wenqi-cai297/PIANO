# V9.1: CondMDI keyframe-inpainting + **x_0-prediction** (v-pred isolation).
#
# Diagnostic for the v9 visual failure (frantic spinning + clumped joints).
# Per design doc 2026-05-09_v9_condmdi_design.md §6 decision tree:
#   "v9 worse than v8 on both → isolate. Try CondMDI-only (keep x_0 pred)
#    or v-pred-only (keep v8 conditioning) to identify which fix hurt."
#
# v9.1 keeps every v9 change EXCEPT prediction_target = "x0":
#   - cond_motion_dim = 136 (CondMDI inpainting channel)
#   - smpl_pose_135_condmdi rep + random K∈[3,12] keyframes at training
#   - object_traj_dim = 24 (no v8 keyframe-channel append)
#   - prediction_target = "x0" ← THIS IS THE ONLY DIFF FROM v9
#
# Hypothesis: v-prediction was undertrained on N=10 subsample. Salimans &
# Ho 2022 §3 explicitly note v-pred is slower to converge from scratch
# than x_0-pred. The "joints clumping" in v9 is consistent with the model
# outputting near-zero v at high-t timesteps (recovered x_0 → 0 → all
# rotations collapse to identity → all joints stack at the root). x_0-pred
# avoids this failure mode by directly regressing the clean motion.
#
# If v9.1 visual looks like v8 (frozen body but skeleton intact, no
# spinning) → v-pred was the regression source. Fix: longer training
# OR drop v-pred; address frozen-body via raised pos_loss_weight + EDGE-
# style vel_weight=2.96 instead.
#
# If v9.1 visual is also broken → CondMDI inpainting itself is the
# regression. Fix: revert cond_motion_input wiring; v8 keyjoint-channel
# was actually the better mechanism for our HOI setting.

model:
  cfg_drop_prob: 0.15

  diffusion:
    num_steps: 1000
    schedule: "cosine"
    prediction_target: "x0"        # ← v9.1 change vs v9

  z_int:
    num_parts: 5
    phase_classes: 3
    support_classes: 3

  denoiser:
    motion_dim: 135
    object_traj_dim: 24
    cond_motion_dim: 136
    init_pose_dim: 66
    text_dim: 512
    object_token_dim: 256
    object_num_tokens: 128
    d_model: 512
    n_layers: 8
    n_heads: 4
    ff_mult: 4
    dropout: 0.1

  object_encoder:
    num_input_points: 1024
    num_output_tokens: 128
    feature_dim: 256

  text_encoder:
    clip_version: "ViT-B/32"
    download_root: "cache/clip"

data:
  datasets:
    - name: "chairs"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/chairs"
    - name: "imhd"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/imhd"
    - name: "neuraldome"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/neuraldome"
    - name: "omomo_correct_v2"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/omomo_correct_v2"
  pseudo_label_dir: null
  pseudo_label_subdir: "pseudo_labels/v18_h10_f05_pelvis20_official_semantic_marker"
  max_seq_length: 196
  support_collapse_hand_support: true
  motion_representation: "smpl_pose_135_condmdi"
  force_world_frame: true
  subsample_n_per_object: 10
  subsample_seed: 42

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42

  augmentation:
    enabled: true
    mirror_prob: 0.0
    rotate_around_y_prob: 0.0
    pc_jitter_std: 0.005

training:
  init_checkpoint: null
  batch_size: 16
  num_epochs: 80
  num_workers: 4
  seed: 42
  optimizer:
    name: "adamw"
    lr: 1.0e-4
    weight_decay: 0.01
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    warmup_steps: 500
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  mixed_precision: "bf16"
  val_every_epochs: 5
  val_best_key: "anchor_l2"

loss:
  anchor_weight: 1.0
  contact_threshold: 0.5

  motion_feature_weights:
    root_rot_vel: 1.0
    root_lin_vel: 1.0
    root_height_y: 1.0
    joint_pos_local: 1.0
    joint_rot_6d: 1.0
    joint_velocity: 1.0
    foot_contact: 1.0

  dynamic_metric:
    enabled: false
  motion_geometric:
    enabled: false

  world_joint_velocity_weight: 1.0
  fk_consistency_weight: 0.0
  pos_loss_weight: 5.0

logging:
  project: "piano"
  run_name: "stageB_anchordiff_v9_1_condmdi_x0pred"
  log_every_n_steps: 50
  save_every_n_epochs: 5

output_dir: "runs/training/stageB_anchordiff_v9_1_condmdi_x0pred"
