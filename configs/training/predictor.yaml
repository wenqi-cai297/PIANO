# Stage A: Interaction Predictor training config.
#
# Hardware target: 2 × NVIDIA A6000 (48 GB each), bf16, Accelerate DDP.
# Effective batch per optimizer step = per_gpu (32) × num_gpu (2) × accum (2) = 128.
# Dataset: v11 InterAct pseudo-labels (3-class phase, closest-point
# xyz GT), 4 subsets, ~8100 clean clips.
#
# Launch:
#   accelerate launch --config_file configs/accelerate_config.yaml \
#     -m piano.training.train_predictor --config configs/training/predictor.yaml

model:
  config: configs/model/interaction_predictor.yaml
  object_encoder_config: configs/model/object_encoder.yaml
  text_encoder: "ViT-B/32"     # matching MoMask's CLIP model
  freeze_text_encoder: true

data:
  # 4-subset InterAct roots. Each root holds metadata.json /
  # metadata_clean.json / motions/ / objects/ / pseudo_labels/.
  # Adjust paths when running on the server.
  datasets:
    - name: "chairs"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/chairs"
    - name: "imhd"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/imhd"
    - name: "neuraldome"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/neuraldome"
    - name: "omomo_correct_v2"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/omomo_correct_v2"
  # Null ⇒ per-subset default <root>/pseudo_labels. HOIDataset auto-
  # prefers <root>/metadata_clean.json (v9) over metadata.json.
  pseudo_label_dir: null
  motion_repr: "humanml3d"       # 263-dim (HumanML3D encoder output)
  max_seq_length: 196
  fps: 20                        # InterAct preprocessed data rate

  # PRIMARY (as of 2026-04-26 / v6+): subject-id split. Stratified per
  # subset so each of the 4 InterAct subsets contributes proportionally
  # to both train and val. Aligns with the HOI generation field standard
  # (BEHAVE/GRAB/OMOMO/InterAct all split by subject, not object —
  # CG-HOI CVPR'24, HOI-Diff, OMOMO SIGGRAPH Asia'23, etc).
  #
  # No test bucket: PIANO's only paper-grade metric is downstream
  # generation quality (Stage C). The Stage A predictor is an
  # intermediate component, so train/val is sufficient — the val bucket
  # is what we look at every iteration to decide v_n -> v_{n+1}.
  #
  # Per-subset 85/15 yields: chairs ~343/60 subjects, imhd 8/1,
  # neuraldome 8-9/1-2, omomo 14/3 (verified locally on v11 metadata).
  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42
    split: "train"               # train | val | all

  # SECONDARY (legacy primary, demoted 2026-04-26): object-id split.
  # Reserved for the optional "novel object generalisation" ablation
  # table — set enabled=true here AND enabled=false on subject_split
  # above to switch paths. Used as Stage A primary in v1-v5; v5 per-
  # object analysis showed 35cm val L2 was outlier-driven (omomo tripod
  # / largetable both novel-geometry, no train neighbour) — see
  # analyses/2026-04-26_*_per_object_analysis.md for the full diagnosis.
  object_split:
    enabled: false
    train_pct: 85
    val_pct: 8
    test_pct: 7
    seed: 42
    split: "train"               # train | val | test | val+test | all

  # Data augmentation (Stage A only). Applied inside HOIDataset
  # __getitem__ before returning. Each is independent; all three are
  # pseudo-label-safe because labels were extracted in object-local
  # frame and are therefore invariant to (a) human world-frame
  # rotation around up-axis, (b) L/R mirror (with channel swap),
  # (c) small object-point-cloud jitter.
  augmentation:
    enabled: true
    mirror_prob: 0.5             # left-right mirror via world-x flip
    rotate_around_y_prob: 1.0    # random θ ∈ [-π, π] around world Y
    pc_jitter_std: 0.005         # meters, Gaussian noise on object PC

training:
  # per-GPU batch size. A6000 48 GB has ample headroom for 32-64 at
  # d=384, L=10, T=196 + 77 text tokens + 128 object tokens. Start
  # conservative; can bump after a 10-step dry run confirms memory.
  batch_size: 32
  num_epochs: 100
  optimizer:
    name: "adamw"
    lr: 1.0e-4
    weight_decay: 0.01
    betas: [0.9, 0.999]
    # v3 finding: Kendall log-var scalars need ~100× the main lr to
    # converge in 100 epochs. At main lr=1e-4 they crawled 0→-0.25
    # in 6300 steps vs equilibrium ≈ -3.3 → multi-task weighting
    # was effectively inactive. Route them to a separate param group
    # with this lr (no weight_decay). Only used when
    # loss.use_kendall_weights=true.
    kendall_lr: 1.0e-2
  scheduler:
    name: "cosine"
    # 200 steps ≈ 6% of total steps (8108 clips / effective-batch 128
    # ≈ 63 steps per epoch × 100 epochs = ~6300 total; target 3-6%
    # warmup per ViT / PointNeXt / MLD conventions).
    warmup_steps: 200
  gradient_accumulation_steps: 2
  max_grad_norm: 1.0
  # Keep-best-val: every N epochs, re-run the training step on the
  # val+test object split with grads disabled; write best_val.pt
  # whenever val ``val_best_key`` improves. Does NOT interrupt training;
  # final.pt is still saved at the end. 0 disables the val loop.
  # Community evidence (ContactGen ICCV'23, PointNeXt NeurIPS'22,
  # ViT, T5, HOI-Diff APDM) supports best-val selection for
  # supervised regression / classification heads even though motion
  # diffusion papers (MDM / MoMask / MLD) don't use it — our
  # Stage A predictor is in the supervised-regression family.
  val_every_epochs: 5
  # Which key from the step_fn loss dict to minimise for best-val
  # selection. v4 found that the Kendall multi-task total ``loss``
  # contains a ``+0.5·s_i`` term whose magnitude grows monotonically
  # as log_var_target descends (s ≈ -3.3 at equilibrium → -1.6
  # contribution). That term decoupled total val_loss from supervision
  # quality, so v4's best_val.pt got saved at epoch 4 (before Kendall
  # took off) and final.pt was 3× better on phase macro-F1 than
  # best_val.pt. v5 selects on ``loss_unweighted`` = sum of the four
  # raw per-task losses (no Kendall combinator, no `0.5·s` term).
  val_best_key: "loss_unweighted"

loss:
  # Contact: BCE on soft [0,1] pseudo-labels.
  # Target:  smooth-L1 on xyz in object-local metres, gated by
  #          gt_contact > 0.5. Summed over the 3 coord dims.
  # Phase / support: CE on integer labels + label_smoothing + focal.
  #
  # **Kendall multi-task uncertainty weighting (CVPR 2018)** —
  # when use_kendall_weights=true, the static *_weight values below
  # are IGNORED. The optimiser learns a per-task log-variance that
  # auto-balances loss-scale differences. v2 found that fixed weights
  # left the target term contributing only ~2% of total gradient
  # because train target loss ≈ 0.018 vs train contact loss ≈ 0.43.
  # Kendall weights remove this hand-tuning by construction —
  # at equilibrium each task contributes 0.5 to the total loss.
  use_kendall_weights: true

  # Static fallback weights — only used if use_kendall_weights=false.
  contact_weight: 2.0
  target_weight: 1.0
  phase_weight: 0.3
  support_weight: 0.1

  # Label smoothing on phase + support CE. Pseudo-labels are ~10%
  # noisy (v9 cleaning reason-counts); label_smoothing=0.1 is the
  # ViT / T5 / PointNeXt / MoMask convention.
  label_smoothing: 0.1
  # Focal loss gamma for phase + support CE (Lin et al., RetinaNet
  # ICCV 2017). Downweights easy/confident samples so rare-class
  # gradient is not swamped. γ=2.0 is the RetinaNet default. 0.0
  # disables. With v5's 3-class phase (lowest class ~30%), focal is
  # almost a no-op on phase; for support's 2.9% `hand_support` and
  # 4.4% `single_foot` it remains the primary tail mechanism.
  focal_gamma: 2.0

  # Logit Adjustment (Menon et al. ICLR 2021) — train-time logit
  # offset by `tau × log π_y` per class. **DISABLED in v5** because v4
  # demonstrated catastrophic over-correction at our class frequencies:
  # phase `pre_contact` (0.51% prior) trained the model to add ~5.3 to
  # raw logit at training, which then dominated argmax at inference and
  # produced "predict pre_contact for ~95% of frames" collapse. The v5
  # phase-class redesign (5→3 classes, lowest now ~30%) makes LA
  # unnecessary at the phase head; support's lowest class is 2.9%
  # which focal γ=2 + label_smoothing 0.1 handle. Re-enable only at
  # τ ≤ 0.25 if v5 leaves support `single_foot` / `hand_support` F1 at 0.
  use_logit_adjustment: false
  logit_adjust_tau: 1.0

priors:
  # Physical prior weights. Two disabled:
  #
  # * reachability: current implementation measures ‖wrist − shoulder‖
  #   (essentially arm-length, a near-constant rotation-invariant
  #   quantity) rather than "hand-to-contact-target distance" as the
  #   docstring claims. Inert until rewritten.
  #
  # * phase_monotonicity: the v5 3-class scheme has no monotonic
  #   ordering at all (non_contact → contact → non_contact is a cycle,
  #   not a monotone progression). The previous expected-phase soft
  #   penalty assumed a 5-class linear ordering. Re-enable only with
  #   a label-aware transition-matrix prior; the current
  #   ``phase_monotonicity_loss`` is meaningless under 3-class.
  #
  # Remaining two priors (contact_persistence, support_smoothness)
  # linearly ramp from 0 to full weight over `prior_warmup_steps`
  # forward calls (≈ 250 optimizer steps at accumulation=2) per
  # PhysDiff / CG-HOI convention.
  reachability_weight: 0.0
  contact_persistence_weight: 0.1
  support_smoothness_weight: 0.05
  phase_monotonicity_weight: 0.0
  prior_warmup_steps: 500

logging:
  project: "piano"
  run_name: "predictor_stageA_v5"
  log_every_n_steps: 50
  save_every_n_epochs: 10

output_dir: "runs/training/predictor"
