# Stage-1 Coarse-v1 prior — S1-O Round-18-fix: object-trajectory-conditioned
# Stage-1 mainline candidate with frame convention matching Coarse-v1 targets.
#
# Supersedes configs/training/coarse_prior_s1o.yaml. The old config pointed
# at cache/stage1_coarse_v1_objtraj_round18/ which stored "obj_traj_canonical"
# (body-canonical frame with inverse Y-rotation + MoMask floor-Y offset).
# Codex review found that Coarse-v1's root_local_trans uses world-axis,
# root0-relative coordinates with NO yaw canonicalization, so the obj_traj
# condition was in a different frame than the target. This config points
# at the Round-18-fix cache that stores obj_traj in the same frame as
# Coarse-v1's root signal:
#
#   obj_traj_root0_world = concat(
#       obj_pos_world - root_world[0],   # (T, 3) world axis
#       obj_rot6d_world,                 # (T, 6) world frame
#   )
#
# DIFFERS from coarse_prior_s1a_cmc.yaml ONLY in:
#   1. model.denoiser.obj_traj_dim: 0  →  9
#   2. data.cache_root: cache/stage1_coarse_v1_full  →  cache/stage1_coarse_v1_objtraj_root0_world_round18_fix
#   3. training.cfg_drop_prob_obj_traj: 0.0  →  0.1
#   4. logging.run_name / group / tags / output_dir
#
# All other hyperparameters identical to Plan A for clean paired comparison.
# Round-18 follow-up trainer changes (Round-18-fix):
# - Model: HintBlock instantiated AFTER base denoiser + _initialize_weights,
#   so same-seed Plan A and S1-O have bitwise-equal shared parameters.
# - Trainer: dedicated `diff_rng` torch.Generator for diffusion timestep
#   and noise sampling, so `t` and `noise` are identical across Plan A
#   and S1-O at same seed. Dedicated `loader_rng` for DataLoader shuffle
#   so model-construction RNG consumption doesn't affect batch order.
#
# Hard constraints unchanged:
# - No object mesh / point cloud / object tokens.
# - No z_int / contact_state / contact_target_xyz / phase / support.
# - No interaction plan / plan_anchor / plan_segment fields.
# - No hand/foot targets.
# - No surface patches.

model:
  diffusion:
    num_steps: 1000
    schedule: "cosine"

  denoiser:
    coarse_dim: 23
    text_dim: 512
    init_pose_dim: 23
    d_model: 512
    n_layers: 8
    n_heads: 4
    ff_mult: 4
    dropout: 0.1
    max_seq_length: 196
    attention_mode: "none"
    block_size: 16
    obj_traj_dim: 9              # 3 (obj_pos_root0_world) + 6 (obj_rot6d_world)
    obj_traj_hint_hidden_mult: 1

data:
  # Round-18-fix cache: obj_traj in SAME frame as Coarse-v1 root_local_trans.
  # Built by scripts/stage_b_generator/build_stage1_coarse_v1_objtraj_root0_world_cache.py.
  cache_root: "cache/stage1_coarse_v1_objtraj_root0_world_round18_fix"
  # Round-20 strategy: deterministic mirror doubling for train only.
  # Requires text embeddings cached with --include-mirrored-texts so
  # direction-mirrored prompts stay aligned with mirrored Coarse-v1 + obj_traj.
  augmentation:
    enabled: true
    mirror_prob: 0.0
    mirror_duplicate: true
    require_mirrored_text_embeddings: true

training:
  batch_size: 16
  gradient_accumulation_steps: 4
  num_workers: 0
  seed: 42
  cfg_drop_prob: 0.1
  cfg_drop_prob_text: 0.1
  cfg_drop_prob_obj_traj: 0.1
  mixed_precision: "bf16"
  # Round-20: Round-19 val minima landed around 30k-40k; continuing to
  # 100k widened the train/val gap. Smoke runs override via
  # --max-train-steps.
  total_steps: 40000
  optimizer:
    name: "adamw"
    lr: 1.0e-4
    weight_decay: 0.01
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    warmup_steps: 1000
  ema_decay: 0.9999
  save_every_n_steps: 5000
  val_every_n_steps: 5000
  val_max_batches: 0

loss:
  # Round-20: x0-pred Min-SNR-gamma weighting, ported from Stage-B v24
  # in the x0 form w_t=min(SNR_t,gamma), normalized per batch.
  use_min_snr_weighting: true
  min_snr_gamma: 5.0
  state_velocity_weight: 1.0
  root_acc_jerk_weight: 0.1
  channel_weights:
    root_local_trans: 1.5
    root_vel: 2.5
    yaw_sincos: 1.0
    yaw_vel: 2.5
    pelvis_rot6d: 1.0
    spine3_rot6d: 1.0
    head_height: 0.5
    shoulder_height: 0.5

logging:
  project: "piano"
  run_name: "stage1_s1o_round20"
  wandb: true
  group: "stage1_round20_plan_a_vs_s1o"
  tags: ["round20", "stage1", "plan_c", "s1o", "object_traj_root0_world", "cmc_scale", "min_snr", "mirror_duplicate"]
  log_every_n_steps: 50

output_dir: "runs/training/stage1_s1o_round20"
