# Stage A: Interaction Predictor v7 — trains on v12 strict pseudo-labels
# instead of v11 "approach-within-12-cm" labels.
#
# Rationale: visual review of v17-E.50 + final.pt failed because the
# generator learned what the v11 labels actually defined — "approach the
# object's neighbourhood", not "make physical contact". The training-vs-
# inference diagnosis (analyses/2026-05-03_unified_metric_results.md)
# confirmed training distribution is the dominant bottleneck (52% of
# correct-part headroom uncaptured by best inference).
#
# v12 strict labels (analyses/2026-05-03_pseudo_label_v12_strict_design.md):
#   - hand contact iff palm-touches-mesh (~5 cm wrist) AND engagement
#     (kinematic OR static) AND duration ≥ 5 frames AND object-local
#     drift ≤ 10 cm
#   - aggregate frame frac drops from 71% (v11) to 50% (v12)
#   - per-subset (n_total=8475 clips):
#       chairs:     74% → 68% (sit captured at realistic per-clip rate)
#       imhd:       66% → 30% (over-counted approach removed)
#       neuraldome: 62% → 28% (over-counted approach removed)
#       omomo:      72% → 53% (grasp-rich, mesh recovers PC bias)
#
# Hardware target: 2 × NVIDIA A6000 (48 GB each), bf16, Accelerate DDP.
# Effective batch per optimizer step = per_gpu (32) × num_gpu (2) × accum (2) = 128.
#
# Launch:
#   accelerate launch --config_file configs/accelerate_config.yaml \
#     -m piano.training.train_predictor \
#     --config configs/training/predictor_v7_v12strict.yaml

model:
  config: configs/model/interaction_predictor.yaml
  object_encoder_config: configs/model/object_encoder.yaml
  text_encoder: "ViT-B/32"
  freeze_text_encoder: true

data:
  datasets:
    - name: "chairs"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/chairs"
    - name: "imhd"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/imhd"
    - name: "neuraldome"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/neuraldome"
    - name: "omomo_correct_v2"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/omomo_correct_v2"
  # v7-specific: use v12_strict labels. Resolves to
  # <root>/pseudo_labels/v12_strict/ for each subset.
  pseudo_label_dir: null
  pseudo_label_subdir: "pseudo_labels/v12_strict"
  motion_repr: "humanml3d"
  max_seq_length: 196
  fps: 20

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42
    split: "train"

  object_split:
    enabled: false
    train_pct: 85
    val_pct: 8
    test_pct: 7
    seed: 42
    split: "train"

  augmentation:
    enabled: true
    mirror_prob: 0.5
    rotate_around_y_prob: 1.0
    pc_jitter_std: 0.005

training:
  batch_size: 32
  num_epochs: 100
  optimizer:
    name: "adamw"
    lr: 1.0e-4
    weight_decay: 0.01
    betas: [0.9, 0.999]
    kendall_lr: 1.0e-2
  scheduler:
    name: "cosine"
    warmup_steps: 200
  gradient_accumulation_steps: 2
  max_grad_norm: 1.0
  val_every_epochs: 5
  val_best_key: "loss_unweighted"

loss:
  use_kendall_weights: true
  contact_weight: 2.0
  target_weight: 1.0
  phase_weight: 0.3
  support_weight: 0.1
  label_smoothing: 0.1
  focal_gamma: 2.0
  use_logit_adjustment: false
  logit_adjust_tau: 1.0

priors:
  reachability_weight: 0.0
  contact_persistence_weight: 0.1
  support_smoothness_weight: 0.05
  phase_monotonicity_weight: 0.0
  prior_warmup_steps: 500

logging:
  project: "piano"
  run_name: "predictor_stageA_v7_v12strict"
  log_every_n_steps: 50
  save_every_n_epochs: 10

output_dir: "runs/training/predictor_v7_v12strict"
