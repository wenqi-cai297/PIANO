# Stage A v9.5 — LOCAL single-GPU variant of predictor_v9_5_finer_encoder.yaml.
#
# Same architecture / loss / encoder hyperparameters as the server config.
# Only differences:
#
# 1. Data paths: Linux server -> Windows local (E:/Project/Datasets/InterAct/...).
# 2. batch_size 32 -> 16, gradient_accumulation_steps 2 -> 8 (effective
#    batch 32 * 2 * 2 = 128 on server DDP -> 16 * 8 * 1 = 128 on local
#    single-GPU; matches optimizer dynamics).
# 3. dataloader num_workers 4 -> 2 (Windows 12 GB host has fewer
#    spare CPU+RAM than the server).
# 4. val_every_epochs unchanged (5); val per-eval is ~5 min on local
#    single 4070 vs ~3 min on server 2xA6000 — acceptable.
#
# Hardware: single RTX 4070 12 GB. ~16-20 h for 100 epochs (server is
# ~8-9 h on 2xA6000). Probe (scripts/stage_a_predictor/probe_local_gpu.py
# at batch_size=16) measured peak reserved 5.4 GB out of 12.0 GB —
# comfortable headroom for dataloader workers + occasional spikes.

model:
  config: configs/model/interaction_predictor.yaml
  object_encoder_config: configs/model/object_encoder.yaml
  text_encoder: "ViT-B/32"
  freeze_text_encoder: true
  # Local-only: keep CLIP ViT-B/32 weights (~340 MB) inside the
  # workspace rather than ~/.cache/clip. Path is relative to
  # cfg-launching cwd (which is the project root).
  clip_download_root: "cache/clip"
  output:
    num_support_states: 3
  structured_head:
    enabled: true
    d_emb: 64
    hidden: 256
    attn_heads: 6
    downstream_mode: "mask"
    target_attn_output: "logits"
    target_attn_kind: "hierarchical_mask_decoder"
    target_decoder_layers: 4
    target_decoder_ffn: 1024
    target_num_patches: 16
    target_pos_enc: true
    target_pos_enc_frequencies: 6
    target_pos_enc_coord_scale: 1.0

  object_encoder:
    num_output_tokens: 256
    sa2_radius: 0.15
    sa2_num_samples: 32

data:
  datasets:
    - name: "chairs"
      root: "E:/Project/Datasets/InterAct/piano/chairs"
    - name: "imhd"
      root: "E:/Project/Datasets/InterAct/piano/imhd"
    - name: "neuraldome"
      root: "E:/Project/Datasets/InterAct/piano/neuraldome"
    - name: "omomo_correct_v2"
      root: "E:/Project/Datasets/InterAct/piano/omomo_correct_v2"
  pseudo_label_dir: null
  pseudo_label_subdir: "pseudo_labels/v12_strict"
  motion_repr: "humanml3d"
  max_seq_length: 196
  fps: 20
  support_collapse_hand_support: true

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42
    split: "train"

  object_split:
    enabled: false
    train_pct: 85
    val_pct: 8
    test_pct: 7
    seed: 42
    split: "train"

  augmentation:
    enabled: true
    mirror_prob: 0.5
    rotate_around_y_prob: 1.0
    pc_jitter_std: 0.005

training:
  batch_size: 16                    # local: 32 -> 16 to fit 12 GB VRAM
  num_epochs: 100
  optimizer:
    name: "adamw"
    lr: 1.0e-4
    weight_decay: 0.01
    betas: [0.9, 0.999]
    kendall_lr: 1.0e-2
  scheduler:
    name: "cosine"
    warmup_steps: 200
  gradient_accumulation_steps: 8    # local: 2 -> 8 to compensate for halved batch + no DDP
  max_grad_norm: 1.0
  val_every_epochs: 5
  val_best_key: "loss_unweighted"

loss:
  use_kendall_weights: false
  contact_weight: 2.0
  target_weight: 5.0
  phase_weight: 0.3
  support_weight: 0.1
  target_gate_kind: "all"

  target_loss_kind: "focal_dice"
  target_focal_alpha: 0.25
  target_focal_gamma: 2.0
  target_tau_per_part: [0.05, 0.05, 0.03, 0.03, 0.12]

  target_topk_min_positives: 1
  target_aux_xyz_weight: 0.3
  target_patch_weight: 0.3

  consistency_weight: 0.0
  label_smoothing: 0.1
  focal_gamma: 2.0

  use_contact_pos_weight: true
  contact_pos_weight_cap: 15.0

  use_logit_adjustment: true
  logit_adjust_tau: 0.3

priors:
  reachability_weight: 0.0
  contact_persistence_weight: 0.1
  support_smoothness_weight: 0.05
  phase_monotonicity_weight: 0.0
  prior_warmup_steps: 500

logging:
  project: "piano"
  run_name: "predictor_stageA_v9_5_finer_encoder_local"
  log_every_n_steps: 50
  save_every_n_epochs: 10

output_dir: "runs/training/predictor_v9_5_finer_encoder_local"
