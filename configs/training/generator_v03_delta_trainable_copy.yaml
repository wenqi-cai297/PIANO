# Stage B v0.3-δ: trainable-copy InterControl pattern.
#
# After v0.7 mirror-aug regressed +13.5 cm vs v0.6 (16.0 → 29.5 cm
# mean_min_dist_per_frame), the γ-gate family is empirically exhausted:
#   v0.4 → v0.5 (160 ep): 0 cm gain
#   v0.4 → v0.6 (per-head γ): −4.9 cm (right-hand only)
#   v0.6 → v0.7 (mirror aug): +13.5 cm regression
# Per-head γ inspect on v0.6 showed all 6 heads converged to nearly
# uniform |γ| within each layer — no specialization, just sign-flexibility.
# Bilateral asymmetry was refuted as data-side by v0.7 (mirror plumbing
# verified mathematically + 11/11 bit-exact tests).
#
# Full retrospective: analyses/2026-04-27_v0_7_outcome.md
#
# This config switches architecture FAMILY: from "γ-gate over a
# fine-tuned MoMask backbone" to "frozen MoMask + trainable-copy ctrl
# branch + per-layer zero-init linear connectors". Recipe directly
# matches:
#   - InterControl §3.2  (Wang et al. NeurIPS'24, arXiv:2311.15864)
#   - OmniControl §3.2   (Xie et al. ICLR'24,    arXiv:2310.08580)
#   - MotionLCM          (Dai et al. ECCV'24,    arXiv:2404.19759)
#   - ControlNet template (Zhang & Agrawala ICCV'23, arXiv:2302.05543)
# OmniControl §4.3 ablation: removing the trainable copy → 4× control
# error worse. PIANO v0.4-v0.7 sit in the no-trainable-copy regime; we
# expect material improvement by switching.
#
# Architecture (built by motion_generator_intercontrol.InterControlTransformerEncoder):
#   - Main branch:  pretrained MoMask seqTransEncoder, FROZEN at
#                   pretraining weights (8 nn.TransformerEncoderLayer's).
#                   Plus all of MoMask's input/output processing
#                   (token_emb, input_process, position_enc, cond_emb,
#                   output_process) is also frozen.
#   - Ctrl branch:  deepcopy of seqTransEncoder layers, trainable. Each
#                   ctrl layer wrapped with IntXAttn (per-head γ, same
#                   as v0.6) so z_int flows in via cross-attention.
#   - Connectors:   per-layer nn.Linear(d, d) with weight + bias = 0 at
#                   init. ctrl features are projected into the main
#                   residual stream via these. At step 0 the ctrl
#                   contribution is exactly 0 → output is byte-identical
#                   to base MoMask (verified by
#                   tests/test_motion_generator_intercontrol.py).
#
# Trainable params:  tokenizer + null_int_kv + ctrl_layers + connectors
#                    ≈ 14M (vs v0.6's 5M new + 14M backbone-finetune).
# Frozen params:     all of mask_transformer except the above + CLIP.
#
# Single-variable diff vs v0.6 (configs/training/generator_v06_per_head_gamma.yaml):
#   model.wrapper_kind:  (unset → "v0.6") → "v0.3-delta"
#   logging.run_name:    v06_per_head_gamma → v03_delta_trainable_copy
#   output_dir:          generator_v06_per_head_gamma → generator_v03_delta_trainable_copy
# Everything else identical: per-head γ gate, body-canonical frame,
# 80 epochs, lr, CFG buckets, encoder-norm fix.
#
# Note: ``training.optimizer.backbone_lr`` is unused in v0.3-δ because
# backbone_parameters() returns []. The trainer's
# build_two_group_optimizer skips empty groups gracefully (check at
# train_generator.py:259), so the effective optimiser is single-group
# AdamW at new_lr. Leaving the key in place to keep the config schema
# consistent with v0.4-v0.7.
#
# Hardware target: 2 × NVIDIA A6000 (48 GB each), bf16, Accelerate DDP.
# Wallclock estimate: ~30-40 min on 2× A6000 (control branch doubles
# the encoder forward pass; bf16 + same batch size). 2-3× v0.4's 13 min.
#
# Launch:
#   accelerate launch --config_file configs/accelerate_config.yaml \
#     -m piano.training.train_generator \
#     --config configs/training/generator_v03_delta_trainable_copy.yaml
#
# Eval (mirrors v0.6 / v0.7 pipeline; same 5 val clips):
#   python scripts/stage_b_generator/qual_eval.py \
#     --config configs/training/generator_v03_delta_trainable_copy.yaml \
#     --ckpt runs/training/generator_v03_delta_trainable_copy/best_val.pt \
#     --output-dir runs/eval/stageB_v0_3_delta_qual --w-int-sweep
#   python scripts/stage_b_generator/measure_contact_distance.py \
#     --input-dir runs/eval/stageB_v0_3_delta_qual/full \
#     --input-dir runs/eval/stageB_v0_3_delta_qual/text_only \
#     --input-dir runs/eval/stageB_v0_3_delta_qual/swap \
#     --input-dir runs/eval/stageB_v0_4_gt_roundtrip/gt_original \
#     --input-dir runs/eval/stageB_v0_4_gt_roundtrip/gt_roundtrip \
#     --output-dir runs/eval/stageB_v0_3_delta_contact_dist
#   python scripts/stage_b_generator/inspect_generator_ckpt.py \
#     --ckpt-dir runs/training/generator_v03_delta_trainable_copy \
#     --names best_val final \
#     --output runs/training/generator_v03_delta_trainable_copy/inspect_summary.json
#
# Decision rule (vs v0.6 SOTA mean_min_dist_per_frame = 16.0 cm):
#   - drop ≥ 3 cm (≤ 13 cm) → SHIP Stage C
#   - drop ≥ 1 cm but < 3 cm → consider per-head γ on ctrl branch (this
#       config already enables it; might also try gamma_kind back to scalar
#       if per-head doesn't specialize, mirroring v0.6 → trainable-copy)
#   - drop < 1 cm → escalate to v0.3-γ codebook retrain on InterAct +
#       HumanML3D union (~3-4h VQ + ~2 days MaskTransformer; InterMask
#       precedent arXiv:2410.10010 §3.1)

model:
  config: configs/model/motion_generator.yaml
  text_encoder: "ViT-B/32"
  # *** v0.3-δ delta — switch wrapper to InterControl pattern ***
  wrapper_kind: "v0.3-delta"
  # Inherit per-head γ from v0.6 (still applied inside ctrl branch's IntXAttn).
  gamma_kind: "per_head"
  checkpoints:
    vq_vae: "checkpoints/momask/t2m/rvq_nq6_dc512_nc512_noshare_qdp0.2/model/net_best_fid.tar"
    masked_transformer: "checkpoints/momask/t2m/t2m_nlayer8_nhead6_ld384_ff1024_cdp0.1_rvq6ns/model/latest.tar"

data:
  datasets:
    - name: "chairs"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/chairs"
    - name: "imhd"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/imhd"
    - name: "neuraldome"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/neuraldome"
    - name: "omomo_correct_v2"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/omomo_correct_v2"
  pseudo_label_dir: null
  motion_repr: "humanml3d"
  max_seq_length: 196
  fps: 20

  force_world_frame: false      # body-canonical, same as v0.4-v0.7

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42
    split: "train"

  object_split:
    enabled: false
    train_pct: 85
    val_pct: 8
    test_pct: 7
    seed: 42
    split: "train"

  augmentation:
    enabled: false               # v0.7 disproved bilateral mirror; reset to v0.6 baseline
    mirror_prob: 0.0
    rotate_around_y_prob: 0.0
    pc_jitter_std: 0.0

training:
  seed: 42
  batch_size: 32
  num_epochs: 80                 # same as v0.4 / v0.6
  num_workers: 4
  mixed_precision: "bf16"

  optimizer:
    name: "adamw"
    new_lr: 1.0e-4
    backbone_lr: 5.0e-5          # unused in v0.3-δ (main frozen → empty backbone group)
    weight_decay: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: "cosine"
    warmup_steps: 1000

  gradient_accumulation_steps: 2
  max_grad_norm: 1.0

  cfg_drop_buckets:
    drop_both: 0.10
    drop_int_only: 0.10
    drop_text_only: 0.05

  val_every_epochs: 5
  val_best_key: "loss"

logging:
  project: "piano"
  run_name: "predictor_stageB_v03_delta_trainable_copy"
  log_every_n_steps: 50
  save_every_n_epochs: 5

# Separate output dir to preserve v0.4 / v0.5 / v0.6 / v0.7 ckpts.
output_dir: "runs/training/generator_v03_delta_trainable_copy"
