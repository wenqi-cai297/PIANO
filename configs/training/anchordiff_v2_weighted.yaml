# PIANO-AnchorDiff v2: feature-weighted MSE to fix root-rotation drift.
#
# v1 (commit 5d2a751 → final.pt) trained 100 epoch but body kept spinning
# at inference. Per-feature RMSE diagnostic showed root_rot_vel was
# 32× off vs GT std (anchordiff_feature_diag.py output 2026-05-08).
# Plain MSE drowns the 1-d Y-rotation-velocity channel under 99.6% of
# joint-position dimensions; cumsum amplifies the residual into 200+°
# heading drift over 196 frames.
#
# Standard MDM/OMOMO/HumanML3D fix: per-feature MSE weights boosting
# the root channels by 30-100×. Also raises anchor_weight 1.0 → 5.0 to
# strengthen geometric supervision now that the supervision target is
# clean (post drift-exclusion + Y-rotation aug fix in commits b9d160c
# / 5d2a751).
#
# Design source of truth:
#     analyses/2026-05-08_piano_anchordiff_design.md

model:
  cfg_drop_prob: 0.15

  diffusion:
    num_steps: 1000
    schedule: "cosine"

  z_int:
    num_parts: 5
    phase_classes: 3
    support_classes: 3

  denoiser:
    motion_dim: 263
    object_traj_dim: 9
    init_pose_dim: 66
    text_dim: 512
    object_token_dim: 256
    object_num_tokens: 128
    d_model: 512
    n_layers: 8
    n_heads: 4
    ff_mult: 4
    dropout: 0.1

  object_encoder:
    num_input_points: 1024
    num_output_tokens: 128
    feature_dim: 256

  text_encoder:
    clip_version: "ViT-B/32"
    download_root: "cache/clip"

data:
  datasets:
    - name: "chairs"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/chairs"
    - name: "imhd"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/imhd"
    - name: "neuraldome"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/neuraldome"
    - name: "omomo_correct_v2"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/omomo_correct_v2"
  pseudo_label_dir: null
  pseudo_label_subdir: "pseudo_labels/v18_h10_f05_pelvis20_official_semantic_marker"
  max_seq_length: 196
  support_collapse_hand_support: true

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42

  augmentation:
    enabled: true
    mirror_prob: 0.5
    rotate_around_y_prob: 1.0
    pc_jitter_std: 0.005

training:
  batch_size: 16
  num_epochs: 100
  num_workers: 4
  seed: 42
  optimizer:
    name: "adamw"
    lr: 1.0e-4
    weight_decay: 0.01
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    warmup_steps: 200
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  mixed_precision: "bf16"
  val_every_epochs: 5

loss:
  anchor_weight: 5.0          # 1.0 → 5.0 (anchor signal got drowned by mse)
  contact_threshold: 0.5
  motion_feature_weights:     # critical fix for spinning artifact
    root_rot_vel: 100.0       # was 1, now 100×; recovers Y-rot-vel signal
    root_lin_vel: 30.0
    root_height_y: 30.0
    joint_pos_local: 1.0
    joint_rot_6d: 1.0
    joint_velocity: 1.0
    foot_contact: 5.0

logging:
  project: "piano"
  run_name: "stageB_anchordiff_v2_weighted"
  log_every_n_steps: 50
  save_every_n_epochs: 10

output_dir: "runs/training/stageB_anchordiff_v2_weighted"
