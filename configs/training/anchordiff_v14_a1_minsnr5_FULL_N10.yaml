# V14 — v12 A1 + Min-SNR-γ weighting (Hang et al. arXiv:2303.09556, ICCV 2023).
#
# Per analyses/stageB_updated_training_strategy_and_diagnostics_plan.md §4.
# This is a SINGLE-VARIABLE change vs A1 mainline:
#   loss.use_min_snr_weighting : false → true
#   loss.min_snr_gamma         : (added) 5.0
#
# v13 (architectural fix) regressed (analyses/2026-05-11_v13_dynhead_temporalconv_round_report.md):
# the optimizer dampened the new dynamics branch when given a free path (γ
# learnable + zero-init delta → x_base specialized into smooth GT). v14
# attacks the same frozen-body symptom from the LOSS side instead — keeps
# A1 architecture unchanged but reweights the diffusion mse_x0 loss per
# timestep to focus optimization on lower-noise regimes (which is where
# inference effectively operates at the end of the denoising chain).
#
# For x_0-prediction the min-SNR weight is min(SNR(t), γ), per Hang Table 1
# (NOT the ε-pred form min(SNR,γ)/SNR — the spec doc §4.3 has the wrong
# formula for x_0-pred; see code at src/piano/training/train_anchordiff.py
# (search use_min_snr_weighting) for the correct per-parameterization branching).
# Normalised per-batch so mean(weight) = 1, preserving the absolute scale of
# mse_x0 → other loss weights do NOT need re-tuning.
#
# Targets (per spec §9):
#   - sample body local vel ×GT  ≥  A1 (0.65)  — improve
#   - sample R_hand vel ×GT      ≥  A1 (0.52)  — improve
#   - recon vs sample velocity gap  smaller than A1 (A1 gap was 0.17)
#   - far_unobs                  ≤  A1 (18.87) + 10 %  (≤ 20.8 cm)
#   - gt − zero plan gap         within 25 % of A1's 6.63 cm  (≥ 5 cm)
# Hard floor (rollback): any of:
#   - sample velocity REGRESS vs A1
#   - far_unobs ≥ A1 + 2 cm (≥ 20.9 cm)
#   - plan gap < 75 % of A1 (< 5 cm)
#
# All other settings identical to anchordiff_v12_dit_block_no_planpool_FULL_N10.yaml.

model:
  cfg_drop_prob: 0.15

  diffusion:
    num_steps: 1000
    schedule: "cosine"
    prediction_target: "x0"

  z_int:
    num_parts: 5
    phase_classes: 3
    support_classes: 3

  zero_z_int_for_stageB: false
  zero_dense_contact_target_for_stageB: false
  zero_contact_state_for_stageB: false
  zero_contact_target_for_stageB: false
  zero_phase_for_stageB: false
  zero_support_for_stageB: false
  zero_plan_target_for_stageB: false

  denoiser:
    motion_dim: 135
    object_traj_dim: 24
    cond_motion_dim: 0
    init_pose_dim: 66
    text_dim: 512
    object_token_dim: 256
    object_num_tokens: 128

    use_interaction_plan: true
    plan_k_max: 12
    plan_s_max: 12
    plan_num_anchor_types: 5
    plan_num_parts: 5
    plan_use_segment_tokens: false
    plan_use_context_hint: true
    plan_d_hint: 32
    plan_d_time_embed: 64
    cfg_drop_plan: false

    plan_per_part_tokens: true
    plan_context_hint_mode: "target_aware"

    # *** A1 ***
    use_dit_block: true
    dit_block_use_plan_pool_in_cond: false

    # *** v13 modules disabled (rolled back) ***
    use_v13_dynhead: false
    use_v13_temporal_conv: false

    d_model: 512
    n_layers: 8
    n_heads: 4
    ff_mult: 4
    dropout: 0.1

  object_encoder:
    num_input_points: 1024
    num_output_tokens: 128
    feature_dim: 256

  text_encoder:
    clip_version: "ViT-B/32"
    download_root: "cache/clip"

data:
  datasets:
    - name: "chairs"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/chairs"
    - name: "imhd"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/imhd"
    - name: "neuraldome"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/neuraldome"
    - name: "omomo_correct_v2"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/omomo_correct_v2"
  pseudo_label_dir: null
  pseudo_label_subdir: "pseudo_labels/v18_h10_f05_pelvis20_official_semantic_marker"
  max_seq_length: 196
  support_collapse_hand_support: true
  motion_representation: "smpl_pose_135_plan"
  force_world_frame: true
  subsample_n_per_object: 10
  subsample_seed: 42
  overfit_n_clips: 0

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42

  augmentation:
    enabled: false
    mirror_prob: 0.0
    rotate_around_y_prob: 0.0
    pc_jitter_std: 0.005

training:
  init_checkpoint: null
  batch_size: 16
  num_epochs: 80
  num_workers: 4
  seed: 42
  optimizer:
    name: "adamw"
    lr: 1.0e-4
    weight_decay: 0.01
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    warmup_steps: 500
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  mixed_precision: "bf16"
  val_every_epochs: 5
  val_best_key: "anchor_l2"

loss:
  anchor_weight: 1.0
  contact_threshold: 0.5

  plan_anchor_weight: 1.0
  plan_segment_weight: 0.0
  plan_transition_vel_weight: 1.0
  plan_transition_acc_weight: 1.0
  plan_transition_window: 3

  stable_root_vel_weight: 0.5
  stable_root_acc_weight: 0.25
  stable_support_erode: 4

  stable_local_vel_weight: 0.0
  stable_local_acc_weight: 0.0

  stable_local_vel_cm_weight: 0.0
  stable_local_speed_moment_weight: 0.0
  stable_local_acc_cm_weight: 0.0

  # *** v14 NEW: Min-SNR-γ weighting on diffusion mse_x0 ***
  use_min_snr_weighting: true
  min_snr_gamma: 5.0

  motion_feature_weights:
    root_rot_vel: 1.0
    root_lin_vel: 1.0
    root_height_y: 1.0
    joint_pos_local: 1.0
    joint_rot_6d: 1.0
    joint_velocity: 1.0
    foot_contact: 1.0

  dynamic_metric:
    enabled: false
  motion_geometric:
    enabled: false

  world_joint_velocity_weight: 1.0
  fk_consistency_weight: 0.0
  pos_loss_weight: 5.0

logging:
  project: "piano"
  run_name: "stageB_anchordiff_v14_a1_minsnr5_FULL_N10"
  log_every_n_steps: 10
  save_every_n_epochs: 50

output_dir: "runs/training/stageB_anchordiff_v14_a1_minsnr5_FULL_N10"
