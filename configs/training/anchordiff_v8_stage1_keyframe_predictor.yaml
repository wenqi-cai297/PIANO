# V8 Stage 1: Keyframe predictor — deterministic regression from
# (text, object_traj, z_int) to K=12 keyframe positions of 6 keyjoints
# (root + L/R hand + L/R foot + head). K_MAX=12 padded; per-clip
# keyframe_mask handles variable K.
#
# Ground-truth keyframes come from offline pass:
#   src/piano/data/keyframe_extraction.py
#   scripts/stage_b_generator/extract_v8_keyframes.sh
# Output dir per clip: <data>/keyframes/v8_default/<seq>.npz
#
# This is a small / fast model — ~5M params, ~30 epochs to convergence.

model:
  z_int:
    num_parts: 5
    phase_classes: 3
    support_classes: 3

  predictor:
    object_traj_dim: 24           # COM 3 + rot6d 6 + 5 anchors world * 3
    z_int_dim: 26                 # 5 + 15 + 3 + 3
    text_dim: 512
    init_pose_dim: 66
    d_model: 256
    n_layers: 4
    n_heads: 4
    ff_mult: 4
    dropout: 0.1
    num_keyjoints: 6              # root, L/R hand, L/R foot, head
    k_max: 12

  object_encoder:
    num_input_points: 1024
    num_output_tokens: 128
    feature_dim: 256

  text_encoder:
    clip_version: "ViT-B/32"
    download_root: "cache/clip"

data:
  datasets:
    - name: "chairs"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/chairs"
    - name: "imhd"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/imhd"
    - name: "neuraldome"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/neuraldome"
    - name: "omomo_correct_v2"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/omomo_correct_v2"
  pseudo_label_dir: null
  pseudo_label_subdir: "pseudo_labels/v18_h10_f05_pelvis20_official_semantic_marker"
  max_seq_length: 196
  support_collapse_hand_support: true
  motion_representation: "smpl_pose_135_keyframed"

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42

  augmentation:
    enabled: true
    mirror_prob: 0.0
    rotate_around_y_prob: 0.0
    pc_jitter_std: 0.005

training:
  batch_size: 32
  num_epochs: 30
  num_workers: 4
  seed: 42
  optimizer:
    name: "adamw"
    lr: 1.0e-4
    weight_decay: 0.01
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    warmup_steps: 200
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  mixed_precision: "bf16"
  val_every_epochs: 5

logging:
  project: "piano"
  run_name: "stageB_anchordiff_v8_stage1_keyframe_predictor"
  log_every_n_steps: 50

output_dir: "runs/training/stageB_anchordiff_v8_stage1_keyframe_predictor"
