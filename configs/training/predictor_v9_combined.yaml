# Stage A v9: combine v9.0 (loss-side bug fixes) + v9.1 (mask decoder).
#
# v8.1.1 server eval analysis (2026-05-03) revealed 3 distinct failure
# modes traceable to specific architectural / loss choices:
#
#   1. foot recall = 0 (and hand_support = 0): root cause is a real
#      LOSS BUG — the contact head uses bare F.binary_cross_entropy_with_logits
#      with NO pos_weight and NO focal (focal_gamma in config only
#      applies to phase + support cross-entropy, NOT to contact BCE).
#      Foot positive rate ~3% → BCE is 32× dominated by negatives →
#      model trivially predicts negative everywhere. DECO ICCV'23 +
#      HACO NeurIPS'25 use class-balanced BCE (pos_weight or
#      class-balanced loss), explicitly NOT focal, on the same per-element
#      binary contact problem.
#
#   2. token IoU plateau at 0.13: root cause is HEAD CAPACITY —
#      single Q/K-only cross-attention doesn't have enough refinement
#      depth to disambiguate adjacent tokens for moving contact targets
#      (hand/foot). Pelvis works (stationary contact, fixed target);
#      hand/foot fail. InteractVLM CVPR 2025 (arXiv:2504.05303) replaced
#      DECO's body-part attention with a SAM-style mask decoder + focal+L1
#      and lifted DAMON contact F1 55.0% → 75.6% (+20pp).
#
#   3. Logit Adjustment for phase + support is already implemented in
#      losses.py:236 but disabled in every yaml. Phase macro F1 0.637
#      and support 0.39 are decent without it, but we expect ~ +2-4 pp
#      with logit_adjust on for free.
#
# v9 = three changes simultaneously, single retrain:
#
#   (A) Contact pos_weight: ((1 - π_part) / π_part).clamp(max=15) per
#       body part. Computed at train start from training set scan.
#       Expected foot recall: 0 → 0.20-0.40, hand recall 17-25% → 35-50%.
#
#   (B) AffordanceMaskDecoder (Mask3D / InteractVLM style): replace
#       v8.1's single-layer CrossAttentionWeightsOnly with a 4-layer
#       TransformerDecoder (self-attn over per-(frame, part) queries +
#       cross-attn to obj_tokens + FFN). Final mask via projected
#       Q · K^T. Expected topk3_iou: 0.13 → 0.30+.
#
#   (C) Enable Logit Adjustment for phase + support. Free, already
#       coded.
#
# Keep all v8.1 / v8.1.1 changes (MoMask mask conditioning, multi-hot
# binary GT with top-K=3 minimum, focal+dice loss) since they're proven
# wins (phase F1 fixed, target <5cm hit 4.5%→11.6%, pelvis pct<10cm
# 33.9%→59.1%).
#
# Path B (drop xyz back-compat) still in effect — Stage B v8.1b refactor
# remains downstream after v9 acceptance.
#
# Hardware: 2 × A6000 48 GB, bf16, Accelerate DDP. Estimated ~7 h
# (decoder adds ~ +15% wallclock vs v8.1.1's ~6 h).
#
# Launch:
#   accelerate launch --config_file configs/accelerate_config.yaml \
#     -m piano.training.train_predictor \
#     --config configs/training/predictor_v9_combined.yaml

model:
  config: configs/model/interaction_predictor.yaml
  object_encoder_config: configs/model/object_encoder.yaml
  text_encoder: "ViT-B/32"
  freeze_text_encoder: true
  structured_head:
    enabled: true
    d_emb: 64
    hidden: 256
    attn_heads: 6
    downstream_mode: "mask"
    target_attn_output: "logits"
    # v9 (2026-05-03): Mask3D / InteractVLM style multi-layer decoder.
    target_attn_kind: "mask_decoder"
    target_decoder_layers: 4
    target_decoder_ffn: 1024

data:
  datasets:
    - name: "chairs"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/chairs"
    - name: "imhd"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/imhd"
    - name: "neuraldome"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/neuraldome"
    - name: "omomo_correct_v2"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/omomo_correct_v2"
  pseudo_label_dir: null
  pseudo_label_subdir: "pseudo_labels/v12_strict"
  motion_repr: "humanml3d"
  max_seq_length: 196
  fps: 20

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42
    split: "train"

  object_split:
    enabled: false
    train_pct: 85
    val_pct: 8
    test_pct: 7
    seed: 42
    split: "train"

  augmentation:
    enabled: true
    mirror_prob: 0.5
    rotate_around_y_prob: 1.0
    pc_jitter_std: 0.005

training:
  batch_size: 32
  num_epochs: 100
  optimizer:
    name: "adamw"
    lr: 1.0e-4
    weight_decay: 0.01
    betas: [0.9, 0.999]
    kendall_lr: 1.0e-2
  scheduler:
    name: "cosine"
    warmup_steps: 200
  gradient_accumulation_steps: 2
  max_grad_norm: 1.0
  val_every_epochs: 5
  val_best_key: "loss_unweighted"

loss:
  use_kendall_weights: false
  contact_weight: 2.0
  target_weight: 5.0
  phase_weight: 0.3
  support_weight: 0.1
  target_gate_kind: "all"

  # v8.1 affordance loss (kept from v8.1.1)
  target_loss_kind: "focal_dice"
  target_focal_alpha: 0.25
  target_focal_gamma: 2.0
  target_tau_per_part: [0.05, 0.05, 0.03, 0.03, 0.12]
  target_topk_min_positives: 3

  consistency_weight: 0.0
  label_smoothing: 0.1
  focal_gamma: 2.0   # phase / support CE focal

  # v9 fix (a): class-balanced BCE on contact head. pos_weight is
  # computed from training-set scan as ((1-π)/π).clamp(max=cap) per
  # body part. cap=15 prevents runaway weights when foot prior is
  # near-zero (which would happen if the data extraction failed).
  use_contact_pos_weight: true
  contact_pos_weight_cap: 15.0

  # v9 fix (c): enable Logit Adjustment for phase + support
  # (Menon et al. ICLR 2021). Already coded in losses.py:236 but
  # was disabled in every prior yaml.
  use_logit_adjustment: true
  logit_adjust_tau: 1.0

priors:
  reachability_weight: 0.0
  contact_persistence_weight: 0.1
  support_smoothness_weight: 0.05
  phase_monotonicity_weight: 0.0
  prior_warmup_steps: 500

logging:
  project: "piano"
  run_name: "predictor_stageA_v9_combined"
  log_every_n_steps: 50
  save_every_n_epochs: 10

output_dir: "runs/training/predictor_v9_combined"
