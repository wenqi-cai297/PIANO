# V12 DiT-block FULL N=10 — A1: drop plan_pool from AdaLN.
#
# Per cond_diversity_audit findings (analyses/2026-05-11_cond_diversity_audit.md §4):
# v12's AdaLN cond `c = t_emb + plan_pool_emb` averaged 60 plan tokens, washing
# out per-anchor spatial variation. Same-text clips have 50-180 cm spatial
# spread (data IS discriminative), but plan_pool collapses it to a smoothed
# global summary → model produces "average motion" per text-cluster regardless
# of spatial target. This config tests whether dropping plan_pool from AdaLN
# (forcing plan info through per-layer plan cross-attn only) restores
# per-target sensitivity.
#
# Single-variable change vs anchordiff_v12_dit_block_FULL_N10.yaml:
#   model.denoiser.dit_block_use_plan_pool_in_cond: true → false
#
# Architecture (per design doc §4.4, A1 mode):
#   c = t_emb only (no plan_pool_emb).
#   Plan info reaches the model ONLY through per-layer plan cross-attn,
#   where motion tokens at frame t can attend to specific plan_tokens
#   (preserving per-anchor spatial detail).
#
# Pass criteria (per v12 round report §9 Path A1):
#   - target_perturbed_50cm Δm135 ≥ 0.10 (v12: 0.051, v11: 0.130)
#   - FULL_vs_PLAN_ONLY > 0 (v12: −0.28; restore positive gap)
#   - plan_only_lift > +15 cm (v12: +5.09; recover toward v11's +22.81)
#   - far_unobs ≤ 22 cm (v12: 20.20; slight regression acceptable)
#   - stable_local_vel ≥ 0.5 × GT (v12: ×0.40; hypothesis: spatial routing
#       implicitly imposes velocity scale via anchor-to-anchor target distances)
#
# Hypothesis to verify: A1 alone may partially fix frozen body via implicit
# geometric constraint (must reach specific anchor targets in K frames).
# If local_vel ≥ 0.6 × GT after A1, cm-vel loss not needed.

model:
  cfg_drop_prob: 0.15

  diffusion:
    num_steps: 1000
    schedule: "cosine"
    prediction_target: "x0"

  z_int:
    num_parts: 5
    phase_classes: 3
    support_classes: 3

  zero_z_int_for_stageB: false
  zero_dense_contact_target_for_stageB: false
  zero_contact_state_for_stageB: false
  zero_contact_target_for_stageB: false
  zero_phase_for_stageB: false
  zero_support_for_stageB: false
  zero_plan_target_for_stageB: false

  denoiser:
    motion_dim: 135
    object_traj_dim: 24
    cond_motion_dim: 0
    init_pose_dim: 66
    text_dim: 512
    object_token_dim: 256
    object_num_tokens: 128

    use_interaction_plan: true
    plan_k_max: 12
    plan_s_max: 12
    plan_num_anchor_types: 5
    plan_num_parts: 5
    plan_use_segment_tokens: false
    plan_use_context_hint: true
    plan_d_hint: 32
    plan_d_time_embed: 64
    cfg_drop_plan: false

    plan_per_part_tokens: true
    plan_context_hint_mode: "target_aware"

    # *** v12 ACTIVATION ***
    use_dit_block: true

    # *** v12-A1: drop plan_pool from AdaLN cond ***
    dit_block_use_plan_pool_in_cond: false

    d_model: 512
    n_layers: 8
    n_heads: 4
    ff_mult: 4
    dropout: 0.1

  object_encoder:
    num_input_points: 1024
    num_output_tokens: 128
    feature_dim: 256

  text_encoder:
    clip_version: "ViT-B/32"
    download_root: "cache/clip"

data:
  datasets:
    - name: "chairs"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/chairs"
    - name: "imhd"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/imhd"
    - name: "neuraldome"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/neuraldome"
    - name: "omomo_correct_v2"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/omomo_correct_v2"
  pseudo_label_dir: null
  pseudo_label_subdir: "pseudo_labels/v18_h10_f05_pelvis20_official_semantic_marker"
  max_seq_length: 196
  support_collapse_hand_support: true
  motion_representation: "smpl_pose_135_plan"
  force_world_frame: true
  subsample_n_per_object: 10
  subsample_seed: 42
  overfit_n_clips: 0

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42

  augmentation:
    enabled: false
    mirror_prob: 0.0
    rotate_around_y_prob: 0.0
    pc_jitter_std: 0.005

training:
  init_checkpoint: null
  batch_size: 16
  num_epochs: 80
  num_workers: 4
  seed: 42
  optimizer:
    name: "adamw"
    lr: 1.0e-4
    weight_decay: 0.01
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    warmup_steps: 500
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  mixed_precision: "bf16"
  val_every_epochs: 5
  val_best_key: "anchor_l2"

loss:
  anchor_weight: 1.0
  contact_threshold: 0.5

  plan_anchor_weight: 1.0
  plan_segment_weight: 0.0
  plan_transition_vel_weight: 1.0
  plan_transition_acc_weight: 1.0
  plan_transition_window: 3

  stable_root_vel_weight: 0.5
  stable_root_acc_weight: 0.25
  stable_support_erode: 4

  stable_local_vel_weight: 0.0
  stable_local_acc_weight: 0.0

  # cm-scale local-dyn losses still OFF — single-variable test of A1 alone.
  stable_local_vel_cm_weight: 0.0
  stable_local_speed_moment_weight: 0.0
  stable_local_acc_cm_weight: 0.0

  motion_feature_weights:
    root_rot_vel: 1.0
    root_lin_vel: 1.0
    root_height_y: 1.0
    joint_pos_local: 1.0
    joint_rot_6d: 1.0
    joint_velocity: 1.0
    foot_contact: 1.0

  dynamic_metric:
    enabled: false
  motion_geometric:
    enabled: false

  world_joint_velocity_weight: 1.0
  fk_consistency_weight: 0.0
  pos_loss_weight: 5.0

logging:
  project: "piano"
  run_name: "stageB_anchordiff_v12_dit_block_no_planpool_FULL_N10"
  log_every_n_steps: 10
  save_every_n_epochs: 50

output_dir: "runs/training/stageB_anchordiff_v12_dit_block_no_planpool_FULL_N10"
