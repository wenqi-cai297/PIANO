# PIANO-AnchorDiff v2.1 finetune from the converged v2-weighted run.
#
# Purpose:
# - Use v2 final weights as the model/object-encoder initialization.
# - Reset AdamW + cosine schedule instead of continuing v2's near-zero LR.
# - Enable the dynamic group-level MSE metric from PLAN.md M1.5.
# - Select best_val on stable unweighted x0 MSE because dynamic weighted
#   val loss changes its scale as feature weights update.

model:
  cfg_drop_prob: 0.15

  diffusion:
    num_steps: 1000
    schedule: "cosine"

  z_int:
    num_parts: 5
    phase_classes: 3
    support_classes: 3

  denoiser:
    motion_dim: 263
    object_traj_dim: 9
    init_pose_dim: 66
    text_dim: 512
    object_token_dim: 256
    object_num_tokens: 128
    d_model: 512
    n_layers: 8
    n_heads: 4
    ff_mult: 4
    dropout: 0.1

  object_encoder:
    num_input_points: 1024
    num_output_tokens: 128
    feature_dim: 256

  text_encoder:
    clip_version: "ViT-B/32"
    download_root: "cache/clip"

data:
  datasets:
    - name: "chairs"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/chairs"
    - name: "imhd"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/imhd"
    - name: "neuraldome"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/neuraldome"
    - name: "omomo_correct_v2"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/omomo_correct_v2"
  pseudo_label_dir: null
  pseudo_label_subdir: "pseudo_labels/v18_h10_f05_pelvis20_official_semantic_marker"
  max_seq_length: 196
  support_collapse_hand_support: true

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42

  augmentation:
    enabled: true
    mirror_prob: 0.5
    rotate_around_y_prob: 1.0
    pc_jitter_std: 0.005

training:
  init_checkpoint: "runs/training/stageB_anchordiff_v2_weighted/final.pt"
  batch_size: 16
  num_epochs: 30
  num_workers: 4
  seed: 42
  optimizer:
    name: "adamw"
    lr: 3.0e-5
    weight_decay: 0.01
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    warmup_steps: 100
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  mixed_precision: "bf16"
  val_every_epochs: 5
  val_best_key: "mse_x0_unweighted"

loss:
  anchor_weight: 5.0
  contact_threshold: 0.5

  motion_feature_weights:
    root_rot_vel: 100.0
    root_lin_vel: 30.0
    root_height_y: 30.0
    joint_pos_local: 1.0
    joint_rot_6d: 1.0
    joint_velocity: 1.0
    foot_contact: 5.0

  dynamic_metric:
    enabled: true
    geometry_prior_path: "analyses/2026-05-08_anchordiff_dynamic_metric/geometry_prior.json"
    calibration_clips: "analyses/2026-05-08_anchordiff_dynamic_metric/calibration_clips.json"
    update_every_epochs: 5
    ema_beta: 0.2
    residual_alpha: 0.5
    clamp_min: 0.25
    clamp_max: 150.0
    fixed_timestep: 200
    calibration_seed: 12345

logging:
  project: "piano"
  run_name: "stageB_anchordiff_v2_1_dynamic_ft_from_v2final"
  log_every_n_steps: 50
  save_every_n_epochs: 5

output_dir: "runs/training/stageB_anchordiff_v2_1_dynamic_ft_from_v2final"
