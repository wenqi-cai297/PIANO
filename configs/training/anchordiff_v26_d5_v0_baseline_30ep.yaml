# Round-25 D5 V0 baseline — 30-EPOCH REDO (was 5-ep smoke, too short).
#
# Why this redo: original D5 V0/V1/V2 at num_epochs=5 finished in 23s
# each (5 epoch × 8 batches = 40 grad steps, NOT enough to differentiate
# loss-weight variants). H2 (loss imbalance) verdict requires longer
# training. See analyses/2026-05-23_round25_p0_synthesis.md §5.
#
# This config: same as v26_d5_v0_baseline.yaml + num_epochs 5→30 +
# val_every_epochs 5→10 + save_every_n_epochs 5→10 + new output_dir.
# Wallclock estimate: ~5 min on A6000 (240 grad steps).
#
# Round-25 D5 baseline (V0): current v26 loss weights, on a
# subsample_n_per_object=1 subset.
#
# Codex audit note
# (analyses/2026-05-23_codex_round25_p0_implementation_review.md §4 C6):
# - subsample_n_per_object=1 yields ~74 clips on local metadata
#   (32 chairs + 9 imhd + 20 neuraldome + 13 omomo objects), NOT the
#   ~200 the design doc earlier estimated. The smaller sample reduces
#   D5 statistical power but the V0/V1/V2 internal comparison is
#   still valid because all three share the same subset.
# - warmup_steps=100 differs from v26 mainline (500). All three D5
#   variants share warmup_steps=100, so V1/V2-vs-V0 comparison is
#   internally controlled, but V0 should NOT be described as
#   "bit-for-bit v26 except for endpoint weights".
#
# Pair with anchordiff_v26_d5_v1_hand2x_foot2x.yaml and
# anchordiff_v26_d5_v2_hand5x_foot5x.yaml. The three runs share
# everything except hand/foot endpoint weights; difference in
# limb-endpoint anchor_pose_error tells us whether loss imbalance
# (H2) is the dominant explanation for the limb gap.
#
# Design source:
#   analyses/2026-05-23_round25_diagnostic_bundle_design.md §D5.

model:
  cfg_drop_prob: 0.15

  diffusion:
    num_steps: 1000
    schedule: "cosine"
    prediction_target: "x0"

  z_int:
    num_parts: 5
    phase_classes: 3
    support_classes: 3

  zero_z_int_for_stageB: true
  zero_dense_contact_target_for_stageB: true
  zero_contact_state_for_stageB: true
  zero_contact_target_for_stageB: true
  zero_phase_for_stageB: true
  zero_support_for_stageB: true
  zero_plan_target_for_stageB: false

  denoiser:
    motion_dim: 135
    object_traj_dim: 9
    cond_motion_dim: 0
    init_pose_dim: 66
    text_dim: 512
    object_token_dim: 256
    object_num_tokens: 128
    use_interaction_plan: true
    plan_k_max: 12
    plan_s_max: 12
    plan_num_anchor_types: 5
    plan_num_parts: 5
    plan_use_segment_tokens: false
    plan_use_context_hint: true
    plan_d_hint: 32
    plan_d_time_embed: 64
    cfg_drop_plan: false
    plan_per_part_tokens: true
    plan_context_hint_mode: "target_aware"
    use_dit_block: true
    dit_block_use_plan_pool_in_cond: false
    use_v13_dynhead: false
    use_v13_temporal_conv: false
    d_model: 512
    n_layers: 8
    n_heads: 4
    ff_mult: 4
    dropout: 0.1
    stage1_coarse_dim: 23
    cfg_drop_stage1_coarse: false
    plan_xattn_relative_time_bias: true
    plan_xattn_time_bias_init: 0.5
    plan_tokens_force_null: true

  object_encoder:
    num_input_points: 1024
    num_output_tokens: 128
    feature_dim: 256

  text_encoder:
    clip_version: "ViT-B/32"
    download_root: "cache/clip"

data:
  datasets:
    - name: "chairs"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/chairs"
    - name: "imhd"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/imhd"
    - name: "neuraldome"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/neuraldome"
    - name: "omomo_correct_v2"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/omomo_correct_v2"
  pseudo_label_dir: null
  pseudo_label_subdir: "pseudo_labels/v18_h10_f05_pelvis20_official_semantic_marker"
  max_seq_length: 196
  support_collapse_hand_support: true
  motion_representation: "smpl_pose_135_plan"
  force_world_frame: true
  # D5: subsample_n_per_object=1 keeps one clip per object across the
  # 4 subsets → ~74 clips on local metadata (NOT ~200; see header). To
  # actually get ~200 clips, raise subsample_n_per_object to 3 — but
  # then update V1/V2 to match for fair comparison.
  subsample_n_per_object: 1
  overfit_n_clips: 0
  stage1_coarse_cache_root: "cache/stage1_coarse_v1_full"

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42

  augmentation:
    enabled: false
    mirror_prob: 0.0
    rotate_around_y_prob: 0.0
    pc_jitter_std: 0.005

training:
  init_checkpoint: null
  batch_size: 8
  num_epochs: 30
  num_workers: 4
  seed: 42
  optimizer:
    name: "adamw"
    lr: 1.0e-4
    weight_decay: 0.01
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    warmup_steps: 100
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  mixed_precision: "bf16"
  val_every_epochs: 10
  val_best_key: "anchor_l2"

loss:
  anchor_weight: 1.0
  contact_threshold: 0.5
  plan_anchor_weight: 0.0
  plan_segment_weight: 0.0
  plan_transition_vel_weight: 0.0
  plan_transition_acc_weight: 0.0
  plan_transition_window: 3
  stable_root_vel_weight: 0.5
  stable_root_acc_weight: 0.25
  stable_support_erode: 4
  stable_local_vel_weight: 0.0
  stable_local_acc_weight: 0.0
  stable_local_vel_cm_weight: 0.0
  stable_local_speed_moment_weight: 0.0
  stable_local_acc_cm_weight: 0.0
  use_min_snr_weighting: true
  min_snr_gamma: 5.0
  # D5 V0: baseline endpoint weights = 1.0 (back-compat with v26).
  hand_endpoint_weight: 1.0
  foot_endpoint_weight: 1.0
  motion_feature_weights:
    root_rot_vel: 1.0
    root_lin_vel: 1.0
    root_height_y: 1.0
    joint_pos_local: 1.0
    joint_rot_6d: 1.0
    joint_velocity: 1.0
    foot_contact: 1.0
  dynamic_metric:
    enabled: false
  motion_geometric:
    enabled: false
  world_joint_velocity_weight: 1.0
  fk_consistency_weight: 0.0
  pos_loss_weight: 5.0

logging:
  project: "piano"
  run_name: "stageB_anchordiff_v26_d5_v0_baseline_30ep"
  log_every_n_steps: 25
  save_every_n_epochs: 10

output_dir: "runs/training/stageB_anchordiff_v26_d5_v0_baseline_30ep"
