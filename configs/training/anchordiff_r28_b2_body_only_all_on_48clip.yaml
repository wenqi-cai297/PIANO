# Round-28 r28_b2_body_only_all_on: Body-action hint only (24D, all_on mask). Upper bound on body-only actions.
#
# Generated by scripts/stage_b_generator/round28_make_configs.py.
# Per analyses/round28_claude_code_stage2_oracle_interface_prompt.md.
#
# Warm-starts from v27 final.pt. New parameter tensors
# (oracle_hint_proj.*, body_action_hint_proj.*, *_gate.*, *_adapters.*)
# are zero-init so step-0 forward is bit-exact equal to v27 baseline;
# `partial_init_allow_shape_mismatch: true` lets the ckpt load skip the
# new keys.

model:
  cfg_drop_prob: 0.15

  diffusion:
    num_steps: 1000
    schedule: "cosine"
    prediction_target: "x0"

  z_int:
    num_parts: 5
    phase_classes: 3
    support_classes: 3

  zero_z_int_for_stageB: true
  zero_dense_contact_target_for_stageB: true
  zero_contact_state_for_stageB: true
  zero_contact_target_for_stageB: true
  zero_phase_for_stageB: true
  zero_support_for_stageB: true
  zero_plan_target_for_stageB: false

  denoiser:
    motion_dim: 135
    object_traj_dim: 9
    cond_motion_dim: 0
    init_pose_dim: 66
    text_dim: 512
    object_token_dim: 256
    object_num_tokens: 128
    use_interaction_plan: true
    plan_k_max: 12
    plan_s_max: 12
    plan_num_anchor_types: 5
    plan_num_parts: 5
    plan_use_segment_tokens: false
    plan_use_context_hint: true
    plan_d_hint: 32
    plan_d_time_embed: 64
    cfg_drop_plan: false
    plan_per_part_tokens: true
    plan_context_hint_mode: "target_aware"
    use_dit_block: true
    dit_block_use_plan_pool_in_cond: false
    use_v13_dynhead: false
    use_v13_temporal_conv: false
    d_model: 512
    n_layers: 8
    n_heads: 4
    ff_mult: 4
    dropout: 0.1
    stage1_coarse_dim: 23
    cfg_drop_stage1_coarse: false
    plan_xattn_relative_time_bias: true
    plan_xattn_time_bias_init: 0.5
    plan_tokens_force_null: true
    # Round-28 oracle hint branches.
    use_oracle_interaction_hint: false
    oracle_hint_dim: 0
    use_body_action_hint: true
    body_action_hint_dim: 24
    oracle_hint_injection_mode: "per_layer_adapter"
    separate_hint_branches: true
    zero_init_hint_adapters: true

  object_encoder:
    num_input_points: 1024
    num_output_tokens: 128
    feature_dim: 256

  text_encoder:
    clip_version: "ViT-B/32"
    download_root: "cache/clip"

data:
  datasets:
    - name: "chairs"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/chairs"
    - name: "imhd"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/imhd"
    - name: "neuraldome"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/neuraldome"
    - name: "omomo_correct_v2"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/omomo_correct_v2"
  pseudo_label_dir: null
  pseudo_label_subdir: "pseudo_labels/v18_h10_f05_pelvis20_official_semantic_marker"
  max_seq_length: 196
  support_collapse_hand_support: true
  motion_representation: "smpl_pose_135_plan"
  force_world_frame: true
  subsample_n_per_object: null
  overfit_n_clips: 0
  stage1_coarse_cache_root: "cache/stage1_coarse_v1_full"
  subset_indices_file: "analyses/round28_body_action_train_indices_48.json"
  # Round-28 oracle hint switches (dataset side).
  use_oracle_interaction_hint: false
  oracle_hint_variant: "full"
  oracle_hint_fps: 20.0
  use_body_action_hint: true
  body_action_hint_mask_mode: "all_on"
  body_action_energy_threshold: 0.05
  surface_temporal_aux_fields: false

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42

  augmentation:
    enabled: false
    mirror_prob: 0.0
    rotate_around_y_prob: 0.0
    pc_jitter_std: 0.0

training:
  init_checkpoint: "runs/training/stageB_anchordiff_v27_stage2_anchoraware_FULL_DATA/final.pt"
  partial_init_allow_shape_mismatch: true
  batch_size: 8
  num_epochs: 300
  num_workers: 4
  seed: 42
  stage1_coarse_noise_std: 0.0
  optimizer:
    name: "adamw"
    lr: 5.0e-5
    weight_decay: 0.01
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    warmup_steps: 50
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  mixed_precision: "bf16"
  val_on_train_subset: true
  val_every_epochs: 50
  val_best_key: "loss_anchor_joint_pos"

loss:
  anchor_weight: 0.0
  contact_threshold: 0.5

  plan_anchor_weight: 0.0
  plan_segment_weight: 0.0
  plan_transition_vel_weight: 0.0
  plan_transition_acc_weight: 0.0
  plan_transition_window: 3

  stable_root_vel_weight: 0.5
  stable_root_acc_weight: 0.25
  stable_support_erode: 4
  stable_local_vel_weight: 0.0
  stable_local_acc_weight: 0.0
  stable_local_vel_cm_weight: 0.05
  stable_local_speed_moment_weight: 0.02
  stable_local_acc_cm_weight: 0.0

  hand_endpoint_weight: 2.0
  foot_endpoint_weight: 2.0
  pos_loss_weight: 5.0

  anchor_joint_pos_weight: 10.0
  anchor_joint_vel_weight: 2.0
  anchor_joint_part_weights: [2.0, 2.0, 0.0, 0.0, 0.5]

  use_min_snr_weighting: true
  min_snr_gamma: 5.0
  motion_feature_weights:
    root_rot_vel: 1.0
    root_lin_vel: 1.0
    root_height_y: 1.0
    joint_pos_local: 1.0
    joint_rot_6d: 1.0
    joint_velocity: 1.0
    foot_contact: 1.0
  dynamic_metric:
    enabled: false
  motion_geometric:
    enabled: false
  world_joint_velocity_weight: 1.0
  fk_consistency_weight: 0.0

  temporal_interaction:
    contact_rel_offset_weight: 0.0
    contact_drift_weight: 0.0
    contact_tracking_weight: 0.0
    gait_both_airborne_weight: 0.0
    gait_stance_velocity_weight: 0.0
    hint_contact_consistency_weight: 0.0
    body_action_consistency_weight: 0.0
    contact_threshold: 0.5
    contact_rel_clamp_m: 2.0
    tracking_margin_m: 0.03
    tracking_min_obj_disp_m: 0.05
    floor_quantile: 0.05
    grounded_threshold_above_floor_m: 0.10
    grounded_softness_m: 0.03

logging:
  project: "piano"
  run_name: "stageB_anchordiff_r28_b2_body_only_all_on_48clip"
  log_every_n_steps: 10
  save_every_n_epochs: 50

output_dir: "runs/training/stageB_anchordiff_r28_b2_body_only_all_on_48clip"
