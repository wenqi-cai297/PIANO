# Stage B v0.5: same as v0.4, but 160 epochs instead of 80.
#
# v0.4 best_val landed at epoch 70 (out of 80) with val loss still slowly
# decreasing — model didn't fully converge. GT-VQ roundtrip diagnostic
# (runs/eval/stageB_v0_4_gt_roundtrip/) showed that codebook preserves
# contact fidelity well (gt_roundtrip ≈ gt_original); the v0.4 visual
# failure (body translates with object but contact not precise) is in the
# MaskTransformer's token predictions, not the codebook capacity. The
# cheapest way to improve predictions is to give the model more training
# time + a more aggressive lr schedule (cosine over 160 epochs keeps lr
# higher in the middle than cosine over 80 epochs).
#
# Single-variable changes vs v0.4 (configs/training/generator_v04_normalize.yaml):
#   training.num_epochs: 80 → 160
#   logging.run_name:    predictor_stageB_v04_normalize → predictor_stageB_v05_longer
#   output_dir:          runs/training/generator_v04_normalize → runs/training/generator_v05_longer
#
# The encoder normalization fix (commit 12f3a51) is automatic when
# load_motion_stats resolves <vq_vae_root>/meta/{mean,std}.npy. Same
# config skeleton as v0.4 with these three deltas.
#
# If v0.5 mp4s show body translating + contacting object on ≥3/5 clips
# → SHIP to Stage C, mark v0.3-γ/-δ moot.
# If v0.5 still loses contact precision → next escalation: per-head γ
# (LLaMA-Adapter pattern, ~5 LOC) or trainable-copy InterControl
# (v0.3-δ, ~80 LOC + 2-3× training time).
#
# Hardware target: 2 × NVIDIA A6000 (48 GB each), bf16, Accelerate DDP.
# Training time: ~25 min (2× v0.4's ~13 min).
#
# Launch:
#   accelerate launch --config_file configs/accelerate_config.yaml \
#     -m piano.training.train_generator \
#     --config configs/training/generator_v05_longer.yaml

model:
  config: configs/model/motion_generator.yaml
  text_encoder: "ViT-B/32"
  checkpoints:
    vq_vae: "checkpoints/momask/t2m/rvq_nq6_dc512_nc512_noshare_qdp0.2/model/net_best_fid.tar"
    masked_transformer: "checkpoints/momask/t2m/t2m_nlayer8_nhead6_ld384_ff1024_cdp0.1_rvq6ns/model/latest.tar"

data:
  datasets:
    - name: "chairs"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/chairs"
    - name: "imhd"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/imhd"
    - name: "neuraldome"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/neuraldome"
    - name: "omomo_correct_v2"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/omomo_correct_v2"
  pseudo_label_dir: null
  motion_repr: "humanml3d"
  max_seq_length: 196
  fps: 20

  force_world_frame: false      # body-canonical, same as v0.4

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42
    split: "train"

  object_split:
    enabled: false
    train_pct: 85
    val_pct: 8
    test_pct: 7
    seed: 42
    split: "train"

  augmentation:
    enabled: false
    mirror_prob: 0.0
    rotate_around_y_prob: 0.0
    pc_jitter_std: 0.0

training:
  seed: 42
  batch_size: 32
  num_epochs: 160                # *** v0.5 delta — 2× v0.4 ***
  num_workers: 4
  mixed_precision: "bf16"

  optimizer:
    name: "adamw"
    new_lr: 1.0e-4
    backbone_lr: 5.0e-5
    weight_decay: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: "cosine"
    warmup_steps: 1000           # 2× steps means warmup is now ~5% of total (was ~10%)
                                 # — fine, still well-shaped

  gradient_accumulation_steps: 2
  max_grad_norm: 1.0

  cfg_drop_buckets:
    drop_both: 0.10
    drop_int_only: 0.10
    drop_text_only: 0.05

  val_every_epochs: 5
  val_best_key: "loss"

logging:
  project: "piano"
  run_name: "predictor_stageB_v05_longer"
  log_every_n_steps: 50
  save_every_n_epochs: 5

output_dir: "runs/training/generator_v05_longer"
