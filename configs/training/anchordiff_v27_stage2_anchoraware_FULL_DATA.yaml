# v27 Stage-2 anchor-aware fine-tune (Round-26 motion-faithful patch, 2026-05-24).
#
# Purpose:
#   Fix the Round-25 failure that Stage-2 remains ~19 cm off even under
#   oracle Stage-1 coarse conditioning. This keeps the v26 architecture and
#   checkpoint contract, but changes the training objective so hands/feet are
#   not washed out by all-frame/all-joint averages.
#
# Round-26 motion-faithful patch (applied 2026-05-24, see
#   analyses/2026-05-24_round26_v27_motion_faithful_patch.md):
#   - All loss terms whose TARGET is a pseudo-label-derived contact target
#     are disabled (anchor_weight, plan_anchor_weight). Round-24 already
#     showed those targets are structurally unreachable: even GT joints sit
#     ~30 cm from object-surface contact targets, so the gradient pulls
#     predictions away from GT.
#   - Loss terms whose TARGET is GT motion (anchor_joint_pos/vel, stable_*)
#     remain enabled. Their masks are pseudo-label-derived but their targets
#     are not, so they do not conflict with "fit GT motion".
#   - Foot weight in the sparse-anchor part-weights is set to 0.0 because
#     v18 foot pseudo-label fires on knee/shin markers, not on the ankle/toe
#     joint the loss supervises (see anchor_consistency_loss.py:8-13).
#
# Baseline checkpoint:
#   runs/training/stageB_anchordiff_v25_round23_noplan_clean_alibi_FULL_DATA/final.pt
#
# Primary gates after training (eval with D2 + D3 on v27 ckpt):
#   - D3 oracle-coarse mean must improve from 19.25 cm to < 16.5 cm.
#   - D2 best-of-N must improve from 14.83 cm to < 12.5 cm.
#   - hand/foot pred-to-GT anchor errors must improve, not only pelvis/root.

model:
  cfg_drop_prob: 0.15

  diffusion:
    num_steps: 1000
    schedule: "cosine"
    prediction_target: "x0"

  z_int:
    num_parts: 5
    phase_classes: 3
    support_classes: 3

  # Keep the v26 clean condition contract: no dense GT z_int/contact target
  # route into Stage-2. The new endpoint losses are supervision only.
  zero_z_int_for_stageB: true
  zero_dense_contact_target_for_stageB: true
  zero_contact_state_for_stageB: true
  zero_contact_target_for_stageB: true
  zero_phase_for_stageB: true
  zero_support_for_stageB: true
  zero_plan_target_for_stageB: false

  denoiser:
    motion_dim: 135
    object_traj_dim: 9
    cond_motion_dim: 0
    init_pose_dim: 66
    text_dim: 512
    object_token_dim: 256
    object_num_tokens: 128
    use_interaction_plan: true
    plan_k_max: 12
    plan_s_max: 12
    plan_num_anchor_types: 5
    plan_num_parts: 5
    plan_use_segment_tokens: false
    plan_use_context_hint: true
    plan_d_hint: 32
    plan_d_time_embed: 64
    cfg_drop_plan: false
    plan_per_part_tokens: true
    plan_context_hint_mode: "target_aware"
    use_dit_block: true
    dit_block_use_plan_pool_in_cond: false
    use_v13_dynhead: false
    use_v13_temporal_conv: false
    d_model: 512
    n_layers: 8
    n_heads: 4
    ff_mult: 4
    dropout: 0.1
    stage1_coarse_dim: 23
    cfg_drop_stage1_coarse: false
    plan_xattn_relative_time_bias: true
    plan_xattn_time_bias_init: 0.5
    # Keep plan tokens null to avoid changing the condition path in P0.
    plan_tokens_force_null: true

  object_encoder:
    num_input_points: 1024
    num_output_tokens: 128
    feature_dim: 256

  text_encoder:
    clip_version: "ViT-B/32"
    download_root: "cache/clip"

data:
  datasets:
    - name: "chairs"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/chairs"
    - name: "imhd"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/imhd"
    - name: "neuraldome"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/neuraldome"
    - name: "omomo_correct_v2"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/omomo_correct_v2"
  pseudo_label_dir: null
  pseudo_label_subdir: "pseudo_labels/v18_h10_f05_pelvis20_official_semantic_marker"
  max_seq_length: 196
  support_collapse_hand_support: true
  motion_representation: "smpl_pose_135_plan"
  force_world_frame: true
  subsample_n_per_object: null
  overfit_n_clips: 0
  stage1_coarse_cache_root: "cache/stage1_coarse_v1_full"

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42

  augmentation:
    enabled: false
    mirror_prob: 0.0
    rotate_around_y_prob: 0.0
    pc_jitter_std: 0.005

training:
  init_checkpoint: "runs/training/stageB_anchordiff_v25_round23_noplan_clean_alibi_FULL_DATA/final.pt"
  # bs=8 per GPU × 2 GPU (DDP) × accum 4 = effective 64, matches R23/v25.
  # If you launch single-GPU, increase to 16 to keep effective bs unchanged.
  batch_size: 8
  # 80 ep ≈ 10,500 grad steps (matches R23's training length). Best-val
  # checkpoint by `val_best_key` + periodic epoch_N.pt give post-hoc
  # ckpt-selection safety against overfitting late in the schedule.
  num_epochs: 80
  num_workers: 4
  seed: 42
  # Normalized Coarse-v1 noise is a conservative first robustness step.
  # Evaluation keeps oracle coarse clean because this is applied only while
  # the model is in train() mode.
  stage1_coarse_noise_std: 0.05
  optimizer:
    name: "adamw"
    lr: 5.0e-5
    weight_decay: 0.01
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    warmup_steps: 250
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  mixed_precision: "bf16"
  val_every_epochs: 5
  val_best_key: "loss_anchor_joint_pos"

loss:
  # Round-26 motion-faithful patch: anchor_weight pulls joint center to
  # object-surface contact target (pseudo-label), which Round-24 already
  # showed is structurally unreachable. Disabled — its gradient is a
  # headwind against "fit GT motion".
  anchor_weight: 0.0
  contact_threshold: 0.5

  # Round-26 motion-faithful patch: same broken-target issue as
  # anchor_weight. Disabled. Plan tokens themselves stay null
  # (plan_tokens_force_null: true above) so the model also can't see plan
  # conditioning. Plan branch is now fully inert in v27.
  plan_anchor_weight: 0.0
  plan_segment_weight: 0.0
  plan_transition_vel_weight: 0.0
  plan_transition_acc_weight: 0.0
  plan_transition_window: 3

  # Kept: stable-frame root/local-dynamics losses. Mask is pseudo-label
  # (support + pelvis_contact) but TARGET is GT root/local motion — no
  # conflict with "fit GT motion". v11 frozen-body fix depends on these.
  stable_root_vel_weight: 0.5
  stable_root_acc_weight: 0.25
  stable_support_erode: 4
  stable_local_vel_weight: 0.0
  stable_local_acc_weight: 0.0
  stable_local_vel_cm_weight: 0.05
  stable_local_speed_moment_weight: 0.02
  stable_local_acc_cm_weight: 0.0

  # Kept: dense FK position loss with per-joint endpoint reweighting.
  # Fully motion-only (target = batch["joints"] = FK of GT motion).
  hand_endpoint_weight: 2.0
  foot_endpoint_weight: 2.0
  pos_loss_weight: 5.0

  # Kept: sparse GT-joint endpoint losses on active contact/anchor parts.
  # TARGET is GT joint position (batch["joints"]) — fully motion-only.
  # MASK is contact_state pseudo-label, used only as a frame selector.
  # Part order: left_hand, right_hand, left_foot, right_foot, pelvis.
  # Round-26 patch: foot weights set to 0.0 — v18 foot pseudo-label fires
  # on knee/shin markers, not on the ankle/toe joint this loss supervises
  # (see anchor_consistency_loss.py:8-13 default part_weights).
  anchor_joint_pos_weight: 10.0
  anchor_joint_vel_weight: 2.0
  anchor_joint_part_weights: [2.0, 2.0, 0.0, 0.0, 0.5]

  use_min_snr_weighting: true
  min_snr_gamma: 5.0
  motion_feature_weights:
    root_rot_vel: 1.0
    root_lin_vel: 1.0
    root_height_y: 1.0
    joint_pos_local: 1.0
    joint_rot_6d: 1.0
    joint_velocity: 1.0
    foot_contact: 1.0
  dynamic_metric:
    enabled: false
  motion_geometric:
    enabled: false
  world_joint_velocity_weight: 1.0
  fk_consistency_weight: 0.0

logging:
  project: "piano"
  run_name: "stageB_anchordiff_v27_stage2_anchoraware_FULL_DATA"
  log_every_n_steps: 50
  # 80 ep / save_every_n_epochs=10 → 8 epoch_N.pt × ~600 MB = ~5 GB (server-only).
  save_every_n_epochs: 10

output_dir: "runs/training/stageB_anchordiff_v27_stage2_anchoraware_FULL_DATA"
