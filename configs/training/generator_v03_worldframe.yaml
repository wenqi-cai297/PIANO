# Stage B v0.3-α: world-frame z_int swap.
#
# Single-variable change vs v0.2 (configs/training/generator.yaml):
#   data.force_world_frame: false → true
#
# Tests Hypothesis E from analyses/2026-04-27_v0_3_root_cause_research.md
# §"v0.3-pre measurement results": v0.2 deviated to body-canonical frame
# for obj_com / obj_rot6d (deviation flagged in
# analyses/2026-04-26_stageB_design.md §8.6 as "revisit if v0.2 fails"),
# but the 7-method literature consensus
# (analyses/2026-04-27_object_conditioning_review.md §3.2) is world-frame.
# v0.3-pre measurement (runs/eval/stageB_v0_3_pre/) confirmed the IntXAttn
# adapter is contributing 9.3% mean / 21.2% peak of residual stream — so
# the body-in-place visual failure is NOT a γ-gate problem. The most
# likely remaining cause is frame-choice confusing the model.
#
# Same hyperparams + split + epochs + CFG buckets as v0.2 — only the
# frame and run_name + output_dir change so we can compare directly.
#
# Hardware target: 2 × NVIDIA A6000 (48 GB each), bf16, Accelerate DDP.
# Effective batch per optimizer step = per_gpu (32) × num_gpu (2) × accum (2) = 128.
#
# Launch:
#   accelerate launch --config_file configs/accelerate_config.yaml \
#     -m piano.training.train_generator \
#     --config configs/training/generator_v03_worldframe.yaml

model:
  config: configs/model/motion_generator.yaml
  text_encoder: "ViT-B/32"
  checkpoints:
    vq_vae: "checkpoints/momask/t2m/rvq_nq6_dc512_nc512_noshare_qdp0.2/model/net_best_fid.tar"
    masked_transformer: "checkpoints/momask/t2m/t2m_nlayer8_nhead6_ld384_ff1024_cdp0.1_rvq6ns/model/latest.tar"

data:
  datasets:
    - name: "chairs"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/chairs"
    - name: "imhd"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/imhd"
    - name: "neuraldome"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/neuraldome"
    - name: "omomo_correct_v2"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/omomo_correct_v2"
  pseudo_label_dir: null
  motion_repr: "humanml3d"
  max_seq_length: 196
  fps: 20

  # *** v0.3-α delta vs v0.2: world-frame z_int. ***
  # When True, HOIDataset short-circuits the canonicalization recovery
  # in `_compute_canonical_object_pose` and returns obj_com_world / 6D
  # rotation in the world frame directly. The body representation
  # (motion_263) stays HumanML3D-canonical as MoMask requires — so the
  # body and obj live in different frames now (matches HOI-Diff regime,
  # which uses MutualAttention to bridge; we test whether IntXAttn can
  # learn the bridge implicitly).
  force_world_frame: true

  # Use the SAME by-subject split as Stage A (seed=42). v0.2 also did.
  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42
    split: "train"

  object_split:
    enabled: false
    train_pct: 85
    val_pct: 8
    test_pct: 7
    seed: 42
    split: "train"

  augmentation:
    enabled: false
    mirror_prob: 0.0
    rotate_around_y_prob: 0.0
    pc_jitter_std: 0.0

training:
  seed: 42
  batch_size: 32
  num_epochs: 80                 # same budget as v0.2 — single-var test
  num_workers: 4
  mixed_precision: "bf16"

  optimizer:
    name: "adamw"
    new_lr: 1.0e-4
    backbone_lr: 5.0e-5
    weight_decay: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: "cosine"
    warmup_steps: 1000

  gradient_accumulation_steps: 2
  max_grad_norm: 1.0

  cfg_drop_buckets:
    drop_both: 0.10
    drop_int_only: 0.10
    drop_text_only: 0.05

  val_every_epochs: 5
  val_best_key: "loss"

logging:
  project: "piano"
  run_name: "predictor_stageB_v03_worldframe"
  log_every_n_steps: 50
  save_every_n_epochs: 5

# *** v0.3-α delta: separate output dir to preserve v0.2 ckpts. ***
# v0.2's best_val.pt + final.pt at runs/training/generator/ are still
# the predictor of record for comparison until v0.3-α is validated.
output_dir: "runs/training/generator_v03_worldframe"
