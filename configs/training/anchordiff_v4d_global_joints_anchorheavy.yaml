# PIANO-AnchorDiff v4d: anchor-heavy finetune from v4b best.
#
# v4b fixed the large body/object drift by switching to 66-D world joints and
# appending world-frame anchor targets to the object trajectory. Its best
# checkpoint was epoch30; epoch35 regressed, and hard-case visuals still showed
# 10-20 cm local hand/object residuals. v4d keeps the same representation and
# architecture, but restarts from v4b best with stronger anchor supervision and
# a lower velocity weight so the denoiser is allowed to prioritize contact.

model:
  cfg_drop_prob: 0.10

  diffusion:
    num_steps: 1000
    schedule: "cosine"

  z_int:
    num_parts: 5
    phase_classes: 3
    support_classes: 3

  denoiser:
    motion_dim: 66
    object_traj_dim: 24
    init_pose_dim: 66
    text_dim: 512
    object_token_dim: 256
    object_num_tokens: 128
    d_model: 512
    n_layers: 8
    n_heads: 4
    ff_mult: 4
    dropout: 0.1

  object_encoder:
    num_input_points: 1024
    num_output_tokens: 128
    feature_dim: 256

  text_encoder:
    clip_version: "ViT-B/32"
    download_root: "cache/clip"

data:
  datasets:
    - name: "chairs"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/chairs"
    - name: "imhd"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/imhd"
    - name: "neuraldome"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/neuraldome"
    - name: "omomo_correct_v2"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/omomo_correct_v2"
  pseudo_label_dir: null
  pseudo_label_subdir: "pseudo_labels/v18_h10_f05_pelvis20_official_semantic_marker"
  max_seq_length: 196
  support_collapse_hand_support: true
  motion_representation: "joints22_world"
  force_world_frame: true

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42

  augmentation:
    enabled: true
    mirror_prob: 0.5
    rotate_around_y_prob: 1.0
    pc_jitter_std: 0.005

training:
  init_checkpoint: "runs/training/stageB_anchordiff_v4b_global_joints_anchorworld/best_val.pt"
  partial_init_allow_shape_mismatch: false
  batch_size: 16
  num_epochs: 20
  num_workers: 4
  seed: 44
  optimizer:
    name: "adamw"
    lr: 1.0e-5
    weight_decay: 0.01
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    warmup_steps: 100
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  mixed_precision: "bf16"
  val_every_epochs: 2
  val_best_key: "anchor_l2"

loss:
  anchor_weight: 20.0
  contact_threshold: 0.5
  world_joint_velocity_weight: 0.25
  motion_geometric:
    enabled: false

logging:
  project: "piano"
  run_name: "stageB_anchordiff_v4d_global_joints_anchorheavy"
  log_every_n_steps: 50
  save_every_n_epochs: 2

output_dir: "runs/training/stageB_anchordiff_v4d_global_joints_anchorheavy"
