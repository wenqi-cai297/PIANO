# Stage B v0.9: C2 decoded-space contact auxiliary loss on top of C1.
#
# Delta from v0.8:
#   - Keep base + residual z_int conditioning.
#   - Add a decoded geometric auxiliary loss on base-token logits:
#       relaxed base logits + GT residual RVQ codes
#       -> frozen RVQ-VAE decoder
#       -> MoMask recover_from_ric
#       -> canonical-frame body-to-object min distance.
#
# Launch:
#   accelerate launch --config_file configs/accelerate_config.yaml \
#     -m piano.training.train_generator \
#     --config configs/training/generator_v09_decoded_contact_aux.yaml

model:
  config: configs/model/motion_generator.yaml
  text_encoder: "ViT-B/32"
  gamma_kind: "per_head"
  residual_int_xattn:
    enabled: true
    zero_init_gamma: true
    gamma_kind: "per_head"
    dropout: 0.1
  checkpoints:
    vq_vae: "checkpoints/momask/t2m/rvq_nq6_dc512_nc512_noshare_qdp0.2/model/net_best_fid.tar"
    masked_transformer: "checkpoints/momask/t2m/t2m_nlayer8_nhead6_ld384_ff1024_cdp0.1_rvq6ns/model/latest.tar"
    residual_transformer: "checkpoints/momask/t2m/tres_nlayer8_ld384_ff1024_rvq6ns_cdp0.2_sw/model/net_best_fid.tar"

data:
  datasets:
    - name: "chairs"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/chairs"
    - name: "imhd"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/imhd"
    - name: "neuraldome"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/neuraldome"
    - name: "omomo_correct_v2"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/omomo_correct_v2"
  pseudo_label_dir: null
  motion_repr: "humanml3d"
  max_seq_length: 196
  fps: 20

  force_world_frame: false

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42
    split: "train"

  object_split:
    enabled: false
    train_pct: 85
    val_pct: 8
    test_pct: 7
    seed: 42
    split: "train"

  augmentation:
    enabled: false
    mirror_prob: 0.0
    rotate_around_y_prob: 0.0
    pc_jitter_std: 0.0

training:
  seed: 42
  batch_size: 32
  num_epochs: 80
  num_workers: 4
  mixed_precision: "bf16"

  optimizer:
    name: "adamw"
    new_lr: 1.0e-4
    backbone_lr: 5.0e-5
    weight_decay: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: "cosine"
    warmup_steps: 1000

  gradient_accumulation_steps: 2
  max_grad_norm: 1.0

  cfg_drop_buckets:
    drop_both: 0.10
    drop_int_only: 0.10
    drop_text_only: 0.05

  residual_loss_weight: 1.0

  decoded_contact_aux:
    enabled: true
    weight: 0.10
    mode: "metric"
    temperature: 1.0
    num_object_points: 256

  val_every_epochs: 5
  val_best_key: "loss"

  contact_eval:
    enabled: true
    num_clips: 20
    seed: 42
    w_text: 4.0
    w_int: 2.0
    best_key: "mean_min_dist"

logging:
  project: "piano"
  run_name: "predictor_stageB_v09_decoded_contact_aux"
  log_every_n_steps: 50
  save_every_n_epochs: 5

output_dir: "runs/training/generator_v09_decoded_contact_aux"
