# Stage B v0.18: v16 architecture / loss / augmentation, but trained on
# v12 STRICT pseudo-labels instead of v11.
#
# Motivation: the 2026-05-03 visual review of v17-E.50 + final.pt failed
# ("人没真正接触到物体，只是有点靠近而已"); the unified-metric diagnosis
# attributed 52% of the correct-part headroom to training-distribution
# quality (analyses/2026-05-03_unified_metric_results.md). The v11
# pseudo-label defines hand contact as "wrist within 12 cm of mesh"
# which is "approach", not "touch". v12 strict redefines using OMOMO/
# CHOIS/InterDiff convention (5 cm palm + duration ≥ 5 frames + engagement
# kinematic OR static + drift filter ≤ 10 cm).
#
# v18 keeps everything else from v16 unchanged so the only variable
# isolated is "what does 'contact' mean during training". Predicted:
# raw correct_part_recall 0.176 → 0.30+, guided 0.292 → 0.40+, visual:
# real contact instead of approach.
#
# v12 label v11→v12 frame-frac shift (n_total=8475 sequences, mesh-based):
#   chairs:     74% → 68%   (sit captured at realistic per-clip rate)
#   imhd:       66% → 30%   (over-counted approach removed)
#   neuraldome: 62% → 28%   (over-counted approach removed; 31% of
#                            sequences end up zero-contact — those are
#                            short transit / approach-only clips, not
#                            real grip; the contact_aux loss
#                            self-weights them to 0)
#   omomo:      72% → 53%   (grasp-rich; mesh recovers PC sparsity)
# Aggregate: ~71% → 50%.
#
# Detail: analyses/2026-05-03_pseudo_label_v12_strict_design.md.

model:
  config: configs/model/motion_generator.yaml
  text_encoder: "ViT-B/32"
  gamma_kind: "per_head"
  residual_int_xattn:
    enabled: true
    zero_init_gamma: true
    gamma_kind: "per_head"
    dropout: 0.1
  checkpoints:
    vq_vae: "checkpoints/momask/t2m/rvq_nq6_dc512_nc512_noshare_qdp0.2/model/net_best_fid.tar"
    masked_transformer: "checkpoints/momask/t2m/t2m_nlayer8_nhead6_ld384_ff1024_cdp0.1_rvq6ns/model/latest.tar"
    residual_transformer: "checkpoints/momask/t2m/tres_nlayer8_ld384_ff1024_rvq6ns_cdp0.2_sw/model/net_best_fid.tar"

data:
  datasets:
    - name: "chairs"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/chairs"
    - name: "imhd"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/imhd"
    - name: "neuraldome"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/neuraldome"
    - name: "omomo_correct_v2"
      root: "/media/gpu-server-1/4TB_for_data/Cai/datasets/InterAct/piano/omomo_correct_v2"
  # v18 KEY DIFFERENCE: load v12 strict pseudo-labels.
  # Resolves to <root>/pseudo_labels/v12_strict/ for each subset.
  pseudo_label_dir: null
  pseudo_label_subdir: "pseudo_labels/v12_strict"
  motion_repr: "humanml3d"
  max_seq_length: 196
  fps: 20
  force_world_frame: false

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42
    split: "train"

  object_split:
    enabled: false
    train_pct: 85
    val_pct: 8
    test_pct: 7
    seed: 42
    split: "train"

  augmentation:
    enabled: true
    mirror_prob: 0.0
    mirror_duplicate: true
    rotate_around_y_prob: 0.0
    pc_jitter_std: 0.0

training:
  seed: 42
  batch_size: 32
  num_epochs: 80
  num_workers: 4
  mixed_precision: "bf16"

  optimizer:
    name: "adamw"
    new_lr: 1.0e-4
    backbone_lr: 5.0e-5
    weight_decay: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: "cosine"
    warmup_steps: 1000

  gradient_accumulation_steps: 2
  max_grad_norm: 1.0

  cfg_drop_buckets:
    drop_both: 0.10
    drop_int_only: 0.10
    drop_text_only: 0.05

  residual_loss_weight: 1.0

  decoded_contact_aux:
    enabled: true
    weight: 1.0
    mode: "target_trajectory"
    rvq_path: "full_prediction"
    temperature: 1.0
    decode_mode: "st_gumbel"
    logit_source: "maskgit_first_step"
    topk_filter_thres: 0.9
    w_text: 4.0
    w_int: 2.0
    res_cond_scale: 2.0
    max_batch_size: 8
    num_object_points: 256
    target_position_weight: 1.0
    target_velocity_weight: 0.5
    metric_weight: 0.05
    part_margin_weight: 0.35
    part_margin_m: 0.08
    segment_consistency_weight: 0.5
    segment_consistency_moving_only: false
    moving_frame_extra_weight: 2.0
    contact_threshold: 0.5
    use_soft_contact_weights: true
    velocity_moving_only: true
    fps: 20.0
    moving_speed_threshold: 0.15
    kin_radius_proxy: 0.3

  diagnostics:
    gradient_norms:
      enabled: false
      every_n_steps: 0
    residual_layers:
      enabled: false

  val_every_epochs: 5
  val_best_key: "loss"

  contact_eval:
    enabled: true
    num_clips: 80
    num_clips_per_subset: 20
    seed: 42
    w_text: 4.0
    w_int: 2.0
    fps: 20.0
    coupling_threshold: 0.5
    moving_speed_threshold: 0.15
    composite_coupling_weight: 0.12
    composite_uncoupled_penalty: 0.05
    composite_min_moving_frame_frac: 0.05
    alignment_recall_penalty: 0.25
    alignment_distance_weight: 0.05
    alignment_coupling_weight: 0.0
    best_key: "alignment_contact_score"

logging:
  project: "piano"
  run_name: "generator_stageB_v18_v12strict"
  log_every_n_steps: 50
  save_every_n_epochs: 5
  train_report_keys:
    - loss
    - loss_base
    - loss_residual
    - loss_decoded_contact
    - loss_weighted_decoded_contact
    - acc
    - acc_residual
    - decoded_contact_aux_target_position
    - decoded_contact_aux_target_velocity
    - decoded_contact_aux_part_margin
    - decoded_contact_aux_part_margin_active_frac
    - decoded_contact_aux_segment_consistency
    - decoded_contact_aux_mean_min_dist
    - decoded_contact_aux_hard_forward
    - gamma_int_abs_mean
    - gamma_int_res_abs_mean
  val_report_keys:
    - loss
    - loss_base
    - loss_residual
    - loss_decoded_contact
    - loss_weighted_decoded_contact
    - acc
    - acc_residual
    - decoded_contact_aux_target_position
    - decoded_contact_aux_target_velocity
    - decoded_contact_aux_part_margin
    - decoded_contact_aux_part_margin_active_frac
    - decoded_contact_aux_segment_consistency
    - decoded_contact_aux_mean_min_dist
    - decoded_contact_aux_hard_forward
  contact_report_keys:
    - alignment_contact_score
    - alignment_primary_error
    - alignment_moving_target_error
    - alignment_moving_same_part_recall
    - alignment_same_part_recall
    - composite_contact_score
    - mean_min_dist
    - moving_close_frame_frac
    - moving_coupled_frame_frac
    - moving_close_but_uncoupled_frac
    - n_clips

output_dir: "runs/training/generator_v18_v12strict"
