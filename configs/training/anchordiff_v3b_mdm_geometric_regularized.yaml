# PIANO-AnchorDiff v3b: decoded geometry as a conservative regularizer.
#
# v3a (`anchordiff_v3_mdm_geometric.yaml`) reset all feature weights to 1.0.
# It degraded early val metrics and made root_rot_vel RMSE/std explode on the
# 4-clip diagnostic at epoch 10. v3b keeps the useful v2.1 dynamic-weight
# endpoint as the feature-MSE base and adds decoded geometry gently.
#
# Design note:
#   analyses/2026-05-08_rotation_feature_prior_work_v3_plan.md

model:
  cfg_drop_prob: 0.15

  diffusion:
    num_steps: 1000
    schedule: "cosine"

  z_int:
    num_parts: 5
    phase_classes: 3
    support_classes: 3

  denoiser:
    motion_dim: 263
    object_traj_dim: 9
    init_pose_dim: 66
    text_dim: 512
    object_token_dim: 256
    object_num_tokens: 128
    d_model: 512
    n_layers: 8
    n_heads: 4
    ff_mult: 4
    dropout: 0.1

  object_encoder:
    num_input_points: 1024
    num_output_tokens: 128
    feature_dim: 256

  text_encoder:
    clip_version: "ViT-B/32"
    download_root: "cache/clip"

data:
  datasets:
    - name: "chairs"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/chairs"
    - name: "imhd"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/imhd"
    - name: "neuraldome"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/neuraldome"
    - name: "omomo_correct_v2"
      root: "E:/Project/Datasets/InterAct/piano_official_process_4/omomo_correct_v2"
  pseudo_label_dir: null
  pseudo_label_subdir: "pseudo_labels/v18_h10_f05_pelvis20_official_semantic_marker"
  max_seq_length: 196
  support_collapse_hand_support: true

  subject_split:
    enabled: true
    train_pct: 85
    val_pct: 15
    seed: 42

  augmentation:
    enabled: true
    mirror_prob: 0.5
    rotate_around_y_prob: 1.0
    pc_jitter_std: 0.005

training:
  init_checkpoint: "runs/training/stageB_anchordiff_v2_1_dynamic_ft_from_v2final/final.pt"
  batch_size: 16
  num_epochs: 30
  num_workers: 4
  seed: 42
  optimizer:
    name: "adamw"
    lr: 1.0e-5
    weight_decay: 0.01
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    warmup_steps: 100
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  mixed_precision: "bf16"
  val_every_epochs: 5
  val_best_key: "loss"

loss:
  anchor_weight: 5.0
  contact_threshold: 0.5

  # Static copy of the v2.1 epoch-30 dynamic weights. This preserves the
  # feature-space root signal that v3a lost, while decoded geometry adds the
  # post-cumsum supervision missing from v2.1.
  motion_feature_weights:
    root_rot_vel: 110.26921837769754
    root_lin_vel: 59.05392607739677
    root_height_y: 30.0
    joint_pos_local: 0.5667588459234548
    joint_rot_6d: 0.6747977973151216
    joint_velocity: 1.1493595504130039
    foot_contact: 3.8398964274570755

  dynamic_metric:
    enabled: false

  motion_geometric:
    enabled: true
    pos_weight: 0.5
    vel_weight: 0.5
    foot_weight: 0.2
    foot_contact_threshold: 0.5
    foot_velocity_threshold: 0.01
    foot_joint_indices: [7, 10, 8, 11]

logging:
  project: "piano"
  run_name: "stageB_anchordiff_v3b_mdm_geometric_regularized"
  log_every_n_steps: 50
  save_every_n_epochs: 5

output_dir: "runs/training/stageB_anchordiff_v3b_mdm_geometric_regularized"
