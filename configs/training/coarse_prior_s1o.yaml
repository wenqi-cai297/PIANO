# Stage-1 Coarse-v1 prior — Plan C / S1-O (Round-18): object-trajectory-
# conditioned Stage-1 mainline candidate.
#
# Per Round-17 §3.3 + §6 + SUGGESTION.md §"Step 6". Stage-1 boundary revised
# from "object-free" to "geometry-light object-trajectory-conditioned,
# plan-free, contact-free".
#
# DIFFERS from coarse_prior_s1a_cmc.yaml ONLY in:
#   1. model.denoiser.obj_traj_dim: 0  →  9   (HintBlock injects per-frame
#      obj_com_canonical(3) + obj_rot6d_canonical(6))
#   2. data.cache_root: points at the Round-18 objtraj cache
#   3. training.cfg_drop_prob_obj_traj: 0.0  →  0.1
#   4. logging.run_name / group / tags / output_dir
#
# All other hyperparameters identical to Plan A so the paired comparison is
# clean — same model size, same optimizer, same EMA, same loss weights,
# same val cadence, same seeds.
#
# Hard constraints:
# - No object mesh / point cloud / object tokens.
# - No z_int / contact_state / contact_target_xyz / phase / support.
# - No interaction plan / plan_anchor / plan_segment fields.
# - No hand/foot targets.
# - No surface patches.
# - obj_traj is the 9-dim BASE (pos + rot6d) only. v18's 24-dim extension
#   (contact-target-lifted anchor world coords) is explicitly NOT used.
# - Cache uses force_world_frame=False so obj_traj is TRUE body-canonical
#   (differs from v18 active's effective-world-frame storage).

model:
  diffusion:
    num_steps: 1000
    schedule: "cosine"

  denoiser:
    coarse_dim: 23
    text_dim: 512
    init_pose_dim: 23
    d_model: 512
    n_layers: 8
    n_heads: 4
    ff_mult: 4
    dropout: 0.1
    max_seq_length: 196
    attention_mode: "none"
    block_size: 16
    # Plan C: 9-dim obj_traj_canonical via CMC-style HintBlock (zero-init
    # last linear, additive per-frame). See ObjTrajHintBlock in
    # src/piano/models/coarse_motion_prior.py.
    obj_traj_dim: 9
    obj_traj_hint_hidden_mult: 1

data:
  # Plan C uses the Round-18 objtraj cache built by
  # scripts/stage_b_generator/build_stage1_coarse_v1_objtraj_cache.py.
  # surface_obj_pose=True, force_world_frame=False (body-canonical).
  cache_root: "cache/stage1_coarse_v1_objtraj_round18"

training:
  batch_size: 16
  gradient_accumulation_steps: 4
  num_workers: 0
  seed: 42
  cfg_drop_prob: 0.1
  cfg_drop_prob_text: 0.1
  cfg_drop_prob_obj_traj: 0.1
  mixed_precision: "bf16"
  total_steps: 100000
  optimizer:
    name: "adamw"
    lr: 1.0e-4
    weight_decay: 0.01
    betas: [0.9, 0.999]
  scheduler:
    name: "cosine"
    warmup_steps: 1000
  ema_decay: 0.9999
  save_every_n_steps: 10000
  val_every_n_steps: 5000
  val_max_batches: 0

loss:
  state_velocity_weight: 1.0
  root_acc_jerk_weight: 0.1
  channel_weights:
    root_local_trans: 1.5
    root_vel: 2.5
    yaw_sincos: 1.0
    yaw_vel: 2.5
    pelvis_rot6d: 1.0
    spine3_rot6d: 1.0
    head_height: 0.5
    shoulder_height: 0.5

logging:
  project: "piano"
  run_name: "stage1_s1o_round18"
  wandb: true
  group: "stage1_round18_plan_a_vs_plan_c"
  tags: ["round18", "stage1", "plan_c", "s1o", "object_traj_conditioned", "cmc_scale"]
  log_every_n_steps: 50

output_dir: "runs/training/stage1_s1o_round18"
