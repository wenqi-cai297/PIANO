# Interaction Predictor architecture config
# Temporal Transformer with Block AttnRes (from MoonshotAI/Attention-Residuals)
#
# Scaled design: deeper but narrower than the original, with AttnRes for
# selective depth-wise aggregation. d_model=384 matches MoMask's latent_dim.

encoder:
  num_layers: 10
  d_model: 384
  num_heads: 6
  dim_feedforward: 1024
  dropout: 0.1

block_attn_res:
  block_size: 2         # layers per block (10 layers / 2 = 5 blocks)
  # Each sublayer (self-attn, cross-attn, FFN) has its own proj + RMSNorm
  # Total AttnRes params: 10 layers × 3 sublayers × (384 + 384) ≈ 23K (negligible)

object_encoder:
  # PointNet++ config
  num_input_points: 1024
  num_output_tokens: 16
  feature_dim: 384      # matches d_model

input:
  text_dim: 512           # CLIP ViT-B/32 output dim (matching MoMask)
  pose_dim: 263           # HumanML3D representation dim

output:
  num_body_parts: 5       # left_hand, right_hand, left_foot, right_foot, pelvis
  num_object_patches: 16  # FPS-sampled surface patches
  num_phases: 5           # approach, pre-contact, stable-contact, manipulation, release
  num_support_states: 4   # both_feet, single_foot, sitting, hand_support

sequence:
  max_length: 196         # max frames (~6.5 sec @ 30fps)
  fps: 30
