# Interaction Predictor architecture config.
#
# Standard pre-norm Transformer with per-token CLIP text cross-attention,
# PointNet++ object cross-attention, and a prepended [POSE] token.
# See src/piano/models/interaction_predictor.py for rationale behind the
# 2026-04-24 rewrite (Block AttnRes removed, AdaLN removed, text cross-attn
# added, [POSE] token added).

encoder:
  num_layers: 10
  d_model: 384
  num_heads: 6
  dim_feedforward: 1024
  dropout: 0.1

object_encoder:
  # See configs/model/object_encoder.yaml for the full PointNet++ spec.
  # 128 tokens (up from 16) gives the object cross-attention enough
  # geometric granularity to discriminate chair seat / armrest / backrest.
  num_input_points: 1024
  num_output_tokens: 128
  feature_dim: 384      # matches encoder.d_model

input:
  text_dim: 512           # CLIP ViT-B/32 per-token feature dim
  pose_dim: 66            # SMPL-22 joint positions (22 × 3)

output:
  num_body_parts: 5       # left_hand, right_hand, left_foot, right_foot, pelvis
  # Contact target is xyz regression in object-local metres (see
  # interaction_predictor.py docstring on why this replaced the K-way
  # patch softmax). num_object_patches is still accepted at load time
  # for back-compat but is a no-op; the head output is 3 regardless.
  num_object_patches: 16
  target_coord_dim: 3
  num_phases: 3           # non_contact, stable_contact, manipulation (v5: 5→3, see analyses/2026-04-25_stageA_v4_results_and_v5_plan.md)
  num_support_states: 4   # both_feet, single_foot, sitting, hand_support

sequence:
  max_length: 196         # max frames (~9.8 s @ 20 fps)
  fps: 20                 # InterAct preprocessed data rate

# Temporal refinement: depthwise-separable 1D conv (VideoPose3D
# CVPR'19 style) inserted between the Transformer output and the
# per-frame heads. Adds explicit temporal-locality inductive bias
# on top of full self-attention. Pre-norm + residual, ~150 K params
# at d=384 / k=5 (~0.5% of the predictor). Default on; set
# enabled=false for ablation comparison vs the v2 architecture.
# Reference: MS-TCN++ CVPR'20, ASFormer BMVC'21, VideoPose3D CVPR'19.
temporal_refine:
  enabled: true
  kernel_size: 5          # ±2 frames = ±0.1 s @ 20 fps
  dropout: 0.1

# StructuredHead (v8 2026-05-05): DAG-ordered conditioning + affordance-
# style target attention. When enabled=true, replaces the four parallel
# nn.Linear heads with sequential conditioning that mirrors the
# extract_*.py DAG (contact → {target, phase} → support). The target
# head emits a soft attention over the 128 object tokens (Move-as-You-Say
# CVPR'24 affordance-heatmap style) instead of regressing world xyz —
# see analyses/2026-05-05_predictor_v8_design.md.
#
# Default off so v6/v7/v7-fix configs reproduce bit-for-bit.
structured_head:
  enabled: false
  d_emb: 64               # contact/phase embedding dim fed downstream
  hidden: 256             # MLP hidden dim for contact/phase/support heads
  attn_heads: 6           # multi-head attention heads for target xattn
