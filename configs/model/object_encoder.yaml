# Object Encoder config (PointNet++ with PointNeXt-style refinement).
#
# Outputs 128 tokens — the K/V set for the Interaction Predictor's object
# cross-attention. 128 is decoupled from the K=16 contact-target label
# space (which remains the classification head's output dim).

pointnet:
  num_input_points: 1024    # FPS-sampled points from object mesh
  input_channels: 3         # xyz only for now (can extend with normals -> 6)
  num_output_tokens: 128    # cross-attention KV count
  feature_dim: 384          # per-token feature dim; matches predictor d_model

  # PointNet++ set abstraction layers (two stages: 1024 -> 512 -> 128)
  sa_layers:
    - num_points: 512
      radius: 0.15
      num_samples: 32
      mlp_channels: [64, 128]
    - num_points: 128
      radius: 0.30
      num_samples: 64
      mlp_channels: [128, 256, 384]

  # PointNeXt inverted-residual MLP on the final centroid features
  refine:
    expansion: 4
    dropout: 0.0
