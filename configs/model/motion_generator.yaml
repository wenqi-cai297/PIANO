# Motion Generator architecture config (Stage B).
#
# Values match MoMask's pretrained HumanML3D checkpoint
#   t2m_nlayer8_nhead6_ld384_ff1024_cdp0.1_rvq6ns
# verified from MoMask source at
#   src/piano/models/backbones/momask/options/base_option.py
# and
#   src/piano/models/backbones/momask/models/mask_transformer/transformer.py
#
# Architecture spec lives in analyses/2026-04-26_stageB_design.md §1, §3, §5.

# --- MoMask Residual VQ-VAE (frozen, base layer used for masked-CE) ---
# Checkpoint: rvq_nq6_dc512_nc512_noshare_qdp0.2
vq_vae:
  input_width: 263                # HumanML3D motion repr dim
  nb_code: 512                    # codebook size per quantizer
  code_dim: 512                   # codebook embedding dim
  down_t: 2                       # temporal downsample stages
  stride_t: 2                     # stride per stage (total = 2² = 4 → unit_length=4)
  width: 512                      # encoder hidden width
  depth: 3                        # residual blocks per stage
  dilation_growth_rate: 3
  num_quantizers: 6               # 1 base + 5 residual

# --- MoMask MaskTransformer (the network we finetune) ---
# Checkpoint: t2m_nlayer8_nhead6_ld384_ff1024_cdp0.1_rvq6ns
masked_transformer:
  num_tokens: 512                 # = vq_vae.nb_code
  code_dim: 512                   # = vq_vae.code_dim (token embedding dim)
  latent_dim: 384                 # transformer hidden dim (must equal interaction_tokenizer.d_model)
  ff_size: 1024
  num_layers: 8
  num_heads: 6
  dropout: 0.1
  clip_dim: 512                   # CLIP ViT-B/32
  cond_drop_prob: 0.1             # MoMask default; OVERRIDDEN at construction
                                  # to 0.0 — wrapper handles per-sample CFG drops
  interaction_drop_prob: 0.1      # legacy, unused when cfg_drop_buckets is set

  # PIANO addition: per-block IntXAttn sublayers (analyses/2026-04-26_stageB_design.md §1).
  interaction_cross_attn:
    enabled: true
    zero_init: true               # γ_int starts at 0 → byte-identical to pretrained MoMask

# --- Interaction tokenizer (z_int → K/V) ---
# Channel layout matches v11 pseudo-labels (5 + 5×3 + 3 + 4 = 27).
interaction_tokenizer:
  d_model: 384                    # must equal masked_transformer.latent_dim
  num_body_parts: 5               # L_hand / R_hand / L_foot / R_foot / pelvis
  target_coord_dim: 3             # xyz in object-local frame (v10/v11)
  num_phases: 3                   # non_contact / stable_contact / manipulation (v5+)
  num_support: 4                  # both_feet / single_foot / sitting / hand_support
  token_stride: 4                 # = vq_vae.down_t × stride_t → align T → S=T/4

# --- MoMask Residual Transformer (frozen for Stage B; touched in Stage 4) ---
# Checkpoint: tres_nlayer8_ld384_ff1024_rvq6ns_cdp0.2_sw  (the `_sw` suffix
# encodes ``share_weight=True`` per analyses/early_setup.md).
residual_transformer:
  num_layers: 8
  latent_dim: 384
  ff_size: 1024
  num_heads: 6
  dropout: 0.1
  cond_drop_prob: 0.2
  shared_codebook: false
  share_weight: true              # MoMask default; matches `_sw` ckpt suffix

# --- Generation config (compositional dual CFG, design §2.2) ---
generation:
  num_iterations: 10              # MaskGIT-style iterative parallel decoding
  temperature: 1.0
  topk_filter_thres: 0.9
  w_text: 4.0                     # text guidance weight (≈ MoMask cond_scale=5)
  w_int: 2.0                      # interaction guidance weight; sweep {1, 2, 3} on val

# --- Checkpoint paths ---
# Defaults match the layout used by the existing
# ``scripts/prep/check_momask_weights.sh`` — adjust per-server.
checkpoints:
  vq_vae: "checkpoints/momask/t2m/rvq_nq6_dc512_nc512_noshare_qdp0.2/model/net_best_fid.tar"
  masked_transformer: "checkpoints/momask/t2m/t2m_nlayer8_nhead6_ld384_ff1024_cdp0.1_rvq6ns/model/latest.tar"
  residual_transformer: "checkpoints/momask/t2m/tres_nlayer8_ld384_ff1024_rvq6ns_cdp0.2_sw/model/net_best_fid.tar"
  length_estimator: "checkpoints/momask/t2m/length_estimator/model/finest.tar"

# --- Motion representation ---
motion:
  repr_dim: 263
  num_joints: 22
  fps: 20                         # InterAct preprocessed rate (NOT MoMask's 30)
